
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stage 1 – Grant Requirements Generation</title>
<style>
  :root{--goa-blue:#0070C0;--goa-dark:#004578;--goa-light:#E8F4FD;--success:#107C10;--warn:#CA8A04;--error:#D13438;--info:#0078D4;--bg:#f5f6f7;--border:#d1d5db;--text:#1a1a1a;--text-sec:#4b5563;--white:#fff;--row-alt:#f9fafb;--font:'Segoe UI',-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);color:var(--text);background:var(--bg);display:flex;flex-direction:column;min-height:100vh;}
/* GOA Header */
.goa-header{background:var(--goa-blue);color:var(--white);padding:12px 24px;display:flex;align-items:center;gap:16px;font-size:18px;font-weight:600;box-shadow:0 2px 4px rgba(0,0,0,.15);}
.goa-header small{font-weight:400;font-size:13px;opacity:.85;}
/* Footer */
.goa-footer{background:var(--goa-dark);color:var(--white);text-align:center;padding:8px;font-size:12px;margin-top:auto;}
/* Main content */
.main{flex:1;padding:24px;max-width:1400px;width:100%;margin:0 auto;}
/* Cards */
.card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:24px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.card h2{color:var(--goa-dark);margin-bottom:12px;font-size:20px;}
.card h3{color:var(--goa-blue);margin-bottom:8px;font-size:16px;}
.card p,.card li{line-height:1.6;color:var(--text-sec);margin-bottom:6px;}
.card ul{padding-left:20px;}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border:none;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s,box-shadow .15s;}
.btn:focus-visible{outline:3px solid var(--goa-blue);outline-offset:2px;}
.btn-primary{background:var(--goa-blue);color:var(--white);}
.btn-primary:hover{background:var(--goa-dark);}
.btn-secondary{background:#e5e7eb;color:var(--text);}
.btn-secondary:hover{background:#d1d5db;}
.btn-danger{background:var(--error);color:var(--white);}
.btn-danger:hover{background:#b91c1c;}
.btn-success{background:var(--success);color:var(--white);}
.btn-success:hover{background:#0a5a0a;}
.btn-sm{padding:4px 10px;font-size:12px;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
/* Drag-drop */
.drop-zone{border:2px dashed var(--goa-blue);border-radius:8px;padding:40px;text-align:center;color:var(--goa-blue);cursor:pointer;transition:background .2s;margin-bottom:12px;}
.drop-zone.dragover{background:var(--goa-light);}
.drop-zone p{font-size:15px;}
/* File list */
.file-list{list-style:none;margin:12px 0;}
.file-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--row-alt);border:1px solid var(--border);border-radius:4px;margin-bottom:4px;font-size:13px;}
.file-item .status{margin-left:auto;font-weight:600;}
.file-item .status.valid{color:var(--success);}
.file-item .status.invalid{color:var(--error);}
.file-item .remove{cursor:pointer;color:var(--error);font-weight:700;margin-left:8px;}
/* Config */
.config-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0;}
.config-grid label{display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer;}
/* Tabs */
.tab-bar{display:flex;gap:2px;border-bottom:2px solid var(--goa-blue);margin-bottom:16px;flex-wrap:wrap;}
.tab-btn{padding:8px 16px;border:none;background:var(--goa-light);color:var(--goa-dark);font-size:13px;font-weight:500;cursor:pointer;border-radius:6px 6px 0 0;transition:background .15s;}
.tab-btn.active{background:var(--goa-blue);color:var(--white);}
.tab-btn:hover:not(.active){background:#bee3f8;}
/* Toolbar */
.toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center;}
.toolbar .spacer{flex:1;}
.export-wrap{position:relative;display:inline-block;}
.export-menu{display:none;position:absolute;top:100%;left:0;background:var(--white);border:1px solid var(--border);border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.12);z-index:100;min-width:140px;}
.export-menu.show{display:block;}
.export-menu button{display:block;width:100%;text-align:left;padding:8px 14px;border:none;background:none;cursor:pointer;font-size:13px;}
.export-menu button:hover{background:var(--goa-light);}
/* Tables / Grids */
.grid-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:6px;}
table.grid{width:100%;border-collapse:collapse;font-size:13px;}
table.grid th{background:var(--goa-dark);color:var(--white);padding:8px 10px;text-align:left;position:sticky;top:0;z-index:2;font-weight:600;white-space:nowrap;}
table.grid td{padding:6px 10px;border-bottom:1px solid var(--border);max-width:260px;overflow:hidden;text-overflow:ellipsis;}
table.grid tr:nth-child(even) td{background:var(--row-alt);}
table.grid tr:hover td{background:var(--goa-light);}
table.grid tr.selected td{background:#bfdbfe;}
td[contenteditable="true"]{cursor:text;outline:none;}
td[contenteditable="true"]:focus{box-shadow:inset 0 0 0 2px var(--goa-blue);background:var(--white)!important;}
/* Badges */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;text-transform:uppercase;}
.badge-pass{background:#dcfce7;color:var(--success);}
.badge-warn{background:#fef9c3;color:var(--warn);}
.badge-error{background:#fee2e2;color:var(--error);}
.badge-info{background:#dbeafe;color:var(--info);}
.badge-imported{background:#ede9fe;color:#7c3aed;}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;justify-content:center;align-items:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--white);border-radius:10px;padding:24px;max-width:720px;width:95%;max-height:85vh;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,.2);}
.modal h2{margin-bottom:16px;color:var(--goa-dark);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
/* Summary stats */
.stats{display:flex;gap:16px;margin:16px 0;flex-wrap:wrap;}
.stat-card{background:var(--goa-light);border:1px solid var(--goa-blue);border-radius:8px;padding:16px 24px;text-align:center;min-width:140px;}
.stat-card .num{font-size:28px;font-weight:700;color:var(--goa-blue);}
.stat-card .lbl{font-size:12px;color:var(--text-sec);margin-top:4px;}
/* Repair mode */
.repair-item{padding:10px;border:1px solid var(--warn);border-radius:6px;margin-bottom:8px;background:#fffbeb;}
.repair-item label{font-weight:600;display:block;margin-bottom:4px;}
.repair-item input{width:100%;padding:6px;border:1px solid var(--border);border-radius:4px;}
/* Version list */
.version-item{display:flex;align-items:center;gap:12px;padding:10px;border-bottom:1px solid var(--border);}
.version-item:last-child{border-bottom:none;}
.version-meta{flex:1;}
.version-meta .vid{font-weight:600;font-size:13px;}
.version-meta .vts{font-size:12px;color:var(--text-sec);}
/* Utilities */
.hidden{display:none!important;}
.mt-8{margin-top:8px;}.mt-16{margin-top:16px;}.mb-8{margin-bottom:8px;}.mb-16{margin-bottom:16px;}
.text-center{text-align:center;}.text-sm{font-size:13px;}.text-muted{color:var(--text-sec);}
.flex-center{display:flex;justify-content:center;align-items:center;gap:8px;}
@media print{.goa-header,.goa-footer,.toolbar,.tab-bar,.btn,.modal-overlay{display:none!important;}.main{padding:0;}}
</style>
</head>
<body>

<!-- GOA Header -->
<header class="goa-header">
<span>&#9733;</span>
<div>Government of Alberta &mdash; AI Grant Requirements Harness<br><small>Classification: Protected A</small></div>
</header>

<!-- Main Content Area -->
<div class="main" id="app"></div>

<!-- Footer -->
<footer class="goa-footer">Classification: Protected A</footer>

<!-- Modals -->
<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalContent"></div></div>

<script>
"use strict";

/* ================================================================
   PHASE 1 — CWDM FOUNDATION (Stage 1-03, Stage 1-05 Build Manifest)
   ================================================================ */
const ENUMS = {
  status: ["Draft","Approved","Partial"],
  origin_type: ["Created","Edited","Imported","Merged","Rolled-Back"],
  validation_status: ["Pass","Warn","Partial"],
  field_type: ["text","textarea","number","date","select","checkbox","radio","file","currency","percentage","email","phone","url","multi-select"],
  response_type: ["free-text","numeric","boolean","single-select","multi-select","date","file-upload","currency","percentage"],
  data_type: ["string","number","boolean","date","array","object","currency","percentage"],
  scoring_method: ["numeric-scale","pass-fail","rubric","weighted","percentage","qualitative"],
  weighting_method: ["equal","proportional","custom","category-based"],
  traceability_type: ["Direct","Derived","Rubric-Based","Policy-Based"],
  severity: ["blocking","warning","informational"]
};

class CWDM {
  static createEmpty() {
    const now = new Date().toISOString();
    return {
      workbook_metadata: {
        workbook_id: CWDM.uid("WB"),
        version_id: CWDM.uid("V"),
        purpose: "",
        created_timestamp: now,
        last_updated_timestamp: now,
        status: "Draft",
        extraction_config: {
          document_types: [
            {type_id:"dt_req",label:"Requirements Checklist",is_present:true,create_tab:true,is_system:true,linked_tab_id:"tab_req"},
            {type_id:"dt_rubric",label:"Rubric / Scoring Guide",is_present:false,create_tab:false,is_system:true,linked_tab_id:"tab_ac"},
            {type_id:"dt_elig",label:"Eligible / Ineligible Criteria",is_present:false,create_tab:false,is_system:true,linked_tab_id:"tab_tr"}
          ]
        }
      },
      entities: {
        requirements: [],
        assessment_criteria: [],
        traceability_records: []
      },
      schema: {
        column_definitions: CWDM.defaultColumns(),
        data_dictionary: { fields: [], tab_mappings: [], source_files: [], generated_timestamp: now }
      },
      relationships: {
        parent_child_links: [],
        dependency_graph: [],
        conditional_logic_rules: [],
        traceability_graph: []
      },
      views: { tabs: CWDM.defaultTabs() },
      version_history: {
        version_graph: [],
        audit_log: []
      }
    };
  }
  static _counters = {};
  static uid(prefix) {
    if(!CWDM._counters[prefix]) CWDM._counters[prefix] = 0;
    CWDM._counters[prefix]++;
    return prefix + '-' + CWDM._counters[prefix];
  }
  static syncCounters(cwdm) {
    var extract = function(arr, field, prefix) {
      (arr||[]).forEach(function(item) {
        var val = item[field] || '';
        var match = String(val).match(new RegExp('^' + prefix + '-(\\d+)$'));
        if(match) {
          var n = parseInt(match[1]);
          if(!CWDM._counters[prefix] || n > CWDM._counters[prefix]) CWDM._counters[prefix] = n;
        }
      });
    };
    if(cwdm.entities) {
      extract(cwdm.entities.requirements, 'row_id', 'ROW');
      extract(cwdm.entities.requirements, 'requirement_id', 'REQ');
      extract(cwdm.entities.assessment_criteria, 'criterion_id', 'AC');
      extract(cwdm.entities.traceability_records, 'trace_id', 'TR');
    }
    if(cwdm.version_history) extract(cwdm.version_history.version_graph, 'version_id', 'V');
  }
  static defaultColumns() {
    const reqCols = [
      {column_id:"col_row_id",display_name:"Row ID",data_type:"string",response_type:"free-text",mandatory:true,validation_rules:{},is_system_column:true,tab_association:"requirements"},
      {column_id:"col_req_id",display_name:"Requirement ID",data_type:"string",response_type:"free-text",mandatory:true,validation_rules:{},is_system_column:true,tab_association:"requirements"},
      {column_id:"col_parent_req",display_name:"Parent Req ID",data_type:"string",response_type:"free-text",mandatory:false,validation_rules:{},is_system_column:false,tab_association:"requirements"},
      {column_id:"col_section",display_name:"Section",data_type:"string",response_type:"free-text",mandatory:false,validation_rules:{},is_system_column:false,tab_association:"requirements"},
      {column_id:"col_question",display_name:"Question ID",data_type:"string",response_type:"free-text",mandatory:false,validation_rules:{},is_system_column:false,tab_association:"requirements"},
      {column_id:"col_field_name",display_name:"Field Name",data_type:"string",response_type:"free-text",mandatory:true,validation_rules:{},is_system_column:false,tab_association:"requirements"},
      {column_id:"col_field_type",display_name:"Field Type",data_type:"string",response_type:"single-select",mandatory:false,validation_rules:{allowed:ENUMS.field_type},is_system_column:false,tab_association:"requirements"},
      {column_id:"col_resp_type",display_name:"Response Type",data_type:"string",response_type:"single-select",mandatory:false,validation_rules:{allowed:ENUMS.response_type},is_system_column:false,tab_association:"requirements"},
      {column_id:"col_data_type",display_name:"Data Type",data_type:"string",response_type:"single-select",mandatory:false,validation_rules:{allowed:ENUMS.data_type},is_system_column:false,tab_association:"requirements"},
      {column_id:"col_mandatory",display_name:"Mandatory",data_type:"boolean",response_type:"boolean",mandatory:true,validation_rules:{},is_system_column:false,tab_association:"requirements"},
      {column_id:"col_evidence",display_name:"Evidence Requirements",data_type:"string",response_type:"free-text",mandatory:false,validation_rules:{},is_system_column:false,tab_association:"requirements"},
      {column_id:"col_guidance",display_name:"Reviewer Guidance",data_type:"string",response_type:"free-text",mandatory:false,validation_rules:{},is_system_column:false,tab_association:"requirements"}
    ];
    const acCols = [
      {column_id:"col_crit_id",display_name:"Criterion ID",data_type:"string",response_type:"free-text",mandatory:true,validation_rules:{},is_system_column:true,tab_association:"assessment_criteria"},
      {column_id:"col_linked_reqs",display_name:"Linked Requirements",data_type:"array",response_type:"free-text",mandatory:false,validation_rules:{},is_system_column:false,tab_association:"assessment_criteria"},
      {column_id:"col_category",display_name:"Category",data_type:"string",response_type:"free-text",mandatory:false,validation_rules:{},is_system_column:false,tab_association:"assessment_criteria"},
      {column_id:"col_subcategory",display_name:"Subcategory",data_type:"string",response_type:"free-text",mandatory:false,validation_rules:{},is_system_column:false,tab_association:"assessment_criteria"},
      {column_id:"col_crit_text",display_name:"Criteria Text",data_type:"string",response_type:"free-text",mandatory:true,validation_rules:{},is_system_column:false,tab_association:"assessment_criteria"},
      {column_id:"col_score_method",display_name:"Scoring Method",data_type:"string",response_type:"single-select",mandatory:false,validation_rules:{allowed:ENUMS.scoring_method},is_system_column:false,tab_association:"assessment_criteria"},
      {column_id:"col_score_rules",display_name:"Scoring Rules",data_type:"string",response_type:"free-text",mandatory:false,validation_rules:{},is_system_column:false,tab_association:"assessment_criteria"},
      {column_id:"col_score_range",display_name:"Scoring Range",data_type:"string",response_type:"free-text",mandatory:false,validation_rules:{},is_system_column:false,tab_association:"assessment_criteria"},
      {column_id:"col_weight",display_name:"Weight",data_type:"number",response_type:"numeric",mandatory:false,validation_rules:{},is_system_column:false,tab_association:"assessment_criteria"},
      {column_id:"col_weight_method",display_name:"Weighting Method",data_type:"string",response_type:"single-select",mandatory:false,validation_rules:{allowed:ENUMS.weighting_method},is_system_column:false,tab_association:"assessment_criteria"}
    ];
    const trCols = [
      {column_id:"col_trace_id",display_name:"Trace ID",data_type:"string",response_type:"free-text",mandatory:true,validation_rules:{},is_system_column:true,tab_association:"traceability"},
      {column_id:"col_trace_req",display_name:"Requirement ID",data_type:"string",response_type:"free-text",mandatory:true,validation_rules:{},is_system_column:false,tab_association:"traceability"},
      {column_id:"col_src_file",display_name:"Source File ID",data_type:"string",response_type:"free-text",mandatory:false,validation_rules:{},is_system_column:false,tab_association:"traceability"},
      {column_id:"col_src_doc",display_name:"Source Document",data_type:"string",response_type:"free-text",mandatory:false,validation_rules:{},is_system_column:false,tab_association:"traceability"},
      {column_id:"col_src_ver",display_name:"Source Version",data_type:"string",response_type:"free-text",mandatory:false,validation_rules:{},is_system_column:false,tab_association:"traceability"},
      {column_id:"col_src_page",display_name:"Page Number",data_type:"number",response_type:"numeric",mandatory:false,validation_rules:{},is_system_column:false,tab_association:"traceability"},
      {column_id:"col_src_sec",display_name:"Section Reference",data_type:"string",response_type:"free-text",mandatory:false,validation_rules:{},is_system_column:false,tab_association:"traceability"},
      {column_id:"col_trace_type",display_name:"Traceability Type",data_type:"string",response_type:"single-select",mandatory:true,validation_rules:{allowed:ENUMS.traceability_type},is_system_column:false,tab_association:"traceability"}
    ];
    return [...reqCols,...acCols,...trCols];
  }
  static defaultTabs() {
    return [
      {tab_id:"tab_req",tab_name:"Requirements",tab_purpose:"Display and edit requirement entities",is_protected:false,is_configurable:false,source_document_type:null,column_order:["col_row_id","col_req_id","col_parent_req","col_section","col_question","col_field_name","col_field_type","col_resp_type","col_data_type","col_mandatory","col_evidence","col_guidance"],formatting_metadata:{}},
      {tab_id:"tab_ac",tab_name:"Assessment Criteria",tab_purpose:"Display and edit assessment criterion entities",is_protected:false,is_configurable:true,source_document_type:"dt_rubric",column_order:["col_crit_id","col_linked_reqs","col_category","col_subcategory","col_crit_text","col_score_method","col_score_rules","col_score_range","col_weight","col_weight_method"],formatting_metadata:{}},
      {tab_id:"tab_tr",tab_name:"Traceability",tab_purpose:"Display traceability records linking requirements to source documents",is_protected:false,is_configurable:true,source_document_type:"dt_elig",column_order:["col_trace_id","col_trace_req","col_src_file","col_src_doc","col_src_ver","col_src_page","col_src_sec","col_trace_type"],formatting_metadata:{}},
      {tab_id:"tab_dd",tab_name:"Data Dictionary",tab_purpose:"Auto-generated schema metadata",is_protected:true,is_configurable:false,source_document_type:null,column_order:[],formatting_metadata:{}},
      {tab_id:"tab_vr",tab_name:"Validation Report",tab_purpose:"Display validation results with severity indicators",is_protected:true,is_configurable:false,source_document_type:null,column_order:[],formatting_metadata:{}}
    ];
  }
  static createRequirement(overrides){
    const id = CWDM.uid("REQ");
    return Object.assign({
      row_id: CWDM.uid("ROW"), requirement_id: id, parent_requirement_id: null,
      dependency_ids: [], conditional_logic_rules: "", section_id: "", question_id: "",
      field_name: "", field_type: "text", response_type: "free-text", data_type: "string",
      mandatory: false, evidence_requirements: "", reviewer_guidance: ""
    }, overrides||{});
  }
  static createAssessmentCriterion(overrides){
    return Object.assign({
      criterion_id: CWDM.uid("AC"), linked_requirement_ids: [], category: "", subcategory: "",
      criteria_text: "", scoring_method: "numeric-scale", scoring_rules: "", scoring_range: "",
      weight: 0, weighting_method: "equal"
    }, overrides||{});
  }
  static createTraceabilityRecord(overrides){
    return Object.assign({
      trace_id: CWDM.uid("TR"), requirement_id: "", source_file_id: "", source_document_name: "",
      source_document_version: "", source_page_number: null, source_section_reference: "",
      traceability_type: "Direct"
    }, overrides||{});
  }
}

/* ================================================================
   PHASE 2 — STATE MANAGEMENT LAYER
   ================================================================ */
class StateManager {
  constructor(){ this.cwdm = null; this.session = { phase:"part1_purpose", uploadedFiles:[], config:{mandatoryFields:true,structurePreservation:true}, selectedRow:null, activeTab:"tab_req", validationResults:[], isApproved:false, repairMode:false, repairIssues:[] }; }
  initialize(){ this.cwdm = CWDM.createEmpty(); this.addAudit("system","CWDM initialized","CWDM created with empty schema"); this.persist(); }
  persist(){ try{ localStorage.setItem("goa_harness_cwdm",JSON.stringify(this.cwdm)); localStorage.setItem("goa_harness_session",JSON.stringify(this.session)); }catch(e){} }
  load(){ try{ const c=localStorage.getItem("goa_harness_cwdm"); const s=localStorage.getItem("goa_harness_session"); if(c){ this.cwdm=JSON.parse(c); CWDM.syncCounters(this.cwdm); if(!this.cwdm.workbook_metadata.extraction_config){ this.cwdm.workbook_metadata.extraction_config={document_types:[{type_id:"dt_req",label:"Requirements Checklist",is_present:true,create_tab:true,is_system:true,linked_tab_id:"tab_req"},{type_id:"dt_rubric",label:"Rubric / Scoring Guide",is_present:false,create_tab:false,is_system:true,linked_tab_id:"tab_ac"},{type_id:"dt_elig",label:"Eligible / Ineligible Criteria",is_present:false,create_tab:false,is_system:true,linked_tab_id:"tab_tr"}]}; } } if(s) this.session=JSON.parse(s); return !!c; }catch(e){ return false; } }
  update(fn, desc){
    if(this.session.isApproved && this.session.phase==="part2"){ return false; }
    fn(this.cwdm);
    this.cwdm.workbook_metadata.last_updated_timestamp = new Date().toISOString();
    this.addAudit("user","CWDM updated",desc||"State mutation");
    this.persist();
    return true;
  }
  transition(phase){ this.session.phase = phase; this.addAudit("system","Phase transition","Transitioned to "+phase); this.persist(); }
  addAudit(actor, action, details){
    if(!this.cwdm) return;
    this.cwdm.version_history.audit_log.push({ event_id: CWDM.uid("EVT"), timestamp: new Date().toISOString(), actor: actor, action: action, details: typeof details==="string"?{message:details}:details });
  }
  getSession(){ return this.session; }
  synchronize(){ this.persist(); }
  reset(){
    localStorage.removeItem("goa_harness_cwdm");
    localStorage.removeItem("goa_harness_session");
    this.cwdm = null;
    this.session = { phase:"part1_purpose", uploadedFiles:[], config:{mandatoryFields:true,structurePreservation:true}, selectedRow:null, activeTab:"tab_req", validationResults:[], isApproved:false, repairMode:false, repairIssues:[] };
    this.initialize();
  }
}

/* ================================================================
   PHASE 3 — VALIDATION FRAMEWORK (V-001 through V-014)
   ================================================================ */
class ValidationEngine {
  static makeError(rule, op, entity, sev, msg, res){
    return { error_id:CWDM.uid("ERR"), timestamp:new Date().toISOString(), operation_type:op, affected_entity:entity, severity:sev, message:"["+rule+"] "+msg, resolution:res||"" };
  }
  static runAll(cwdm, mode){
    mode = mode||"transaction";
    const e=[];
    e.push(...ValidationEngine.v001(cwdm,mode));
    e.push(...ValidationEngine.v002(cwdm,mode));
    e.push(...ValidationEngine.v003(cwdm,mode));
    e.push(...ValidationEngine.v004(cwdm,mode));
    e.push(...ValidationEngine.v005(cwdm,mode));
    e.push(...ValidationEngine.v006(cwdm,mode));
    e.push(...ValidationEngine.v007(cwdm,mode));
    e.push(...ValidationEngine.v008(cwdm,mode));
    e.push(...ValidationEngine.v009(cwdm,mode));
    e.push(...ValidationEngine.v010(cwdm,mode));
    e.push(...ValidationEngine.v011(cwdm,mode));
    e.push(...ValidationEngine.v012(cwdm,mode));
    e.push(...ValidationEngine.v013(cwdm,mode));
    e.push(...ValidationEngine.v014(cwdm,mode));
    return e;
  }
  /* V-001 Global Uniqueness */
  static v001(cwdm,mode){
    const e=[], reqs=cwdm.entities.requirements;
    const rids=new Set(), rowids=new Set();
    reqs.forEach(r=>{
      if(rids.has(r.requirement_id)) e.push(ValidationEngine.makeError("V-001",mode,r.requirement_id,"blocking","Duplicate requirement_id: "+r.requirement_id,"Ensure all requirement IDs are unique"));
      rids.add(r.requirement_id);
      if(rowids.has(r.row_id)) e.push(ValidationEngine.makeError("V-001",mode,r.row_id,"blocking","Duplicate row_id: "+r.row_id,"Ensure all row IDs are unique"));
      rowids.add(r.row_id);
    });
    return e;
  }
  /* V-002 Immutability of Identity */
  static v002(cwdm,mode){
    /* Enforcement is structural — row_id and version_id immutability is enforced by StateManager preventing reassignment. This rule logs informational compliance. */
    return [ValidationEngine.makeError("V-002",mode,"system","informational","Identity immutability rule active. Row IDs and Version IDs are protected by state management.","No action required")];
  }
  /* V-003 Schema Consistency */
  static v003(cwdm,mode){
    const e=[], reqFields=["row_id","requirement_id","field_name","mandatory"];
    cwdm.entities.requirements.forEach(r=>{
      reqFields.forEach(f=>{ if(r[f]===undefined||r[f]===null) e.push(ValidationEngine.makeError("V-003",mode,r.requirement_id||r.row_id,"blocking","Missing required schema field '"+f+"' on requirement entity","Add the missing field")); });
    });
    const acFields=["criterion_id","criteria_text"];
    cwdm.entities.assessment_criteria.forEach(a=>{
      acFields.forEach(f=>{ if(!a[f]) e.push(ValidationEngine.makeError("V-003",mode,a.criterion_id||"unknown","blocking","Missing required schema field '"+f+"' on assessment criterion","Add the missing field")); });
    });
    const trFields=["trace_id","requirement_id","traceability_type"];
    cwdm.entities.traceability_records.forEach(t=>{
      trFields.forEach(f=>{ if(!t[f]) e.push(ValidationEngine.makeError("V-003",mode,t.trace_id||"unknown","blocking","Missing required schema field '"+f+"' on traceability record","Add the missing field")); });
    });
    return e;
  }
  /* V-004 Traceability Integrity */
  static v004(cwdm,mode){
    const e=[], rids=new Set(cwdm.entities.requirements.map(r=>r.requirement_id));
    cwdm.entities.traceability_records.forEach(t=>{
      if(t.requirement_id && !rids.has(t.requirement_id)) e.push(ValidationEngine.makeError("V-004",mode,t.trace_id,"blocking","Traceability record references non-existent requirement_id: "+t.requirement_id,"Correct the requirement_id reference or remove the traceability record"));
    });
    return e;
  }
  /* V-005 Graph Consistency — no cycles */
  static v005(cwdm,mode){
    const e=[], reqs=cwdm.entities.requirements, map=new Map();
    reqs.forEach(r=>map.set(r.requirement_id,r));
    function hasCycle(startId,field){
      const visited=new Set(); let cur=startId;
      while(cur){
        if(visited.has(cur)) return true;
        visited.add(cur);
        const node=map.get(cur);
        cur = node ? node[field] : null;
      }
      return false;
    }
    reqs.forEach(r=>{
      if(r.parent_requirement_id && hasCycle(r.requirement_id,"parent_requirement_id"))
        e.push(ValidationEngine.makeError("V-005",mode,r.requirement_id,"blocking","Circular parent-child relationship detected","Remove the cycle in parent_requirement_id chain"));
    });
    return e;
  }
  /* V-006 Orphan Prevention */
  static v006(cwdm,mode){
    const e=[], rids=new Set(cwdm.entities.requirements.map(r=>r.requirement_id));
    cwdm.entities.requirements.forEach(r=>{
      if(r.parent_requirement_id && !rids.has(r.parent_requirement_id))
        e.push(ValidationEngine.makeError("V-006",mode,r.requirement_id,"warning","Orphaned parent reference: "+r.parent_requirement_id+" does not exist","Correct or remove the parent reference"));
      (r.dependency_ids||[]).forEach(d=>{
        if(!rids.has(d)) e.push(ValidationEngine.makeError("V-006",mode,r.requirement_id,"warning","Orphaned dependency reference: "+d+" does not exist","Correct or remove the dependency"));
      });
    });
    cwdm.entities.assessment_criteria.forEach(a=>{
      (a.linked_requirement_ids||[]).forEach(lr=>{
        if(!rids.has(lr)) e.push(ValidationEngine.makeError("V-006",mode,a.criterion_id,"warning","Assessment criterion references non-existent requirement: "+lr,"Correct the linked requirement ID"));
      });
    });
    return e;
  }
  /* V-007 Type Safety */
  static v007(cwdm,mode){
    const e=[];
    cwdm.entities.assessment_criteria.forEach(a=>{
      if(a.weight!==null && a.weight!==undefined && a.weight!=="" && isNaN(Number(a.weight)))
        e.push(ValidationEngine.makeError("V-007",mode,a.criterion_id,"blocking","Weight field must be numeric, got: "+a.weight,"Enter a valid number"));
    });
    cwdm.entities.traceability_records.forEach(t=>{
      if(t.source_page_number!==null && t.source_page_number!==undefined && t.source_page_number!=="" && isNaN(Number(t.source_page_number)))
        e.push(ValidationEngine.makeError("V-007",mode,t.trace_id,"blocking","Page number must be numeric, got: "+t.source_page_number,"Enter a valid number"));
    });
    return e;
  }
  /* V-008 Mandatory Field Enforcement */
  static v008(cwdm,mode){
    const e=[];
    if(cwdm.workbook_metadata.status==="Approved" || mode==="transaction"){
      cwdm.entities.requirements.forEach(r=>{
        if(!r.field_name || r.field_name.trim()==="") e.push(ValidationEngine.makeError("V-008",mode,r.requirement_id,"blocking","Mandatory field 'field_name' is empty","Provide a field name"));
        if(r.mandatory===null||r.mandatory===undefined) e.push(ValidationEngine.makeError("V-008",mode,r.requirement_id,"blocking","Mandatory field 'mandatory' indicator is not set","Set mandatory to true or false"));
      });
      cwdm.entities.assessment_criteria.forEach(a=>{
        if(!a.criteria_text || a.criteria_text.trim()==="") e.push(ValidationEngine.makeError("V-008",mode,a.criterion_id,"blocking","Mandatory field 'criteria_text' is empty","Provide criteria text"));
      });
    }
    return e;
  }
  /* V-009 Enumerated Validity */
  static v009(cwdm,mode){
    const e=[];
    cwdm.entities.requirements.forEach(r=>{
      if(r.field_type && !ENUMS.field_type.includes(r.field_type)) e.push(ValidationEngine.makeError("V-009",mode,r.requirement_id,"warning","Invalid field_type enum: "+r.field_type,"Use one of: "+ENUMS.field_type.join(", ")));
      if(r.response_type && !ENUMS.response_type.includes(r.response_type)) e.push(ValidationEngine.makeError("V-009",mode,r.requirement_id,"warning","Invalid response_type enum: "+r.response_type,"Use one of: "+ENUMS.response_type.join(", ")));
      if(r.data_type && !ENUMS.data_type.includes(r.data_type)) e.push(ValidationEngine.makeError("V-009",mode,r.requirement_id,"warning","Invalid data_type enum: "+r.data_type,"Use one of: "+ENUMS.data_type.join(", ")));
    });
    cwdm.entities.assessment_criteria.forEach(a=>{
      if(a.scoring_method && !ENUMS.scoring_method.includes(a.scoring_method)) e.push(ValidationEngine.makeError("V-009",mode,a.criterion_id,"warning","Invalid scoring_method enum: "+a.scoring_method,"Use one of: "+ENUMS.scoring_method.join(", ")));
      if(a.weighting_method && !ENUMS.weighting_method.includes(a.weighting_method)) e.push(ValidationEngine.makeError("V-009",mode,a.criterion_id,"warning","Invalid weighting_method enum: "+a.weighting_method,"Use one of: "+ENUMS.weighting_method.join(", ")));
    });
    cwdm.entities.traceability_records.forEach(t=>{
      if(t.traceability_type && !ENUMS.traceability_type.includes(t.traceability_type)) e.push(ValidationEngine.makeError("V-009",mode,t.trace_id,"warning","Invalid traceability_type enum: "+t.traceability_type,"Use one of: "+ENUMS.traceability_type.join(", ")));
    });
    return e;
  }
  /* V-010 Scoring Coherence */
  static v010(cwdm,mode){
    const e=[];
    cwdm.entities.assessment_criteria.forEach(a=>{
      if(a.weight!==null && a.weight!==undefined && a.weight!=="" && Number(a.weight)<0)
        e.push(ValidationEngine.makeError("V-010",mode,a.criterion_id,"warning","Weight is negative: "+a.weight,"Weight should be >= 0"));
      if(a.scoring_range){
        const parts=a.scoring_range.split("-").map(Number);
        if(parts.length===2 && !isNaN(parts[0]) && !isNaN(parts[1]) && parts[0]>parts[1])
          e.push(ValidationEngine.makeError("V-010",mode,a.criterion_id,"warning","Scoring range minimum exceeds maximum: "+a.scoring_range,"Correct the range so minimum <= maximum"));
      }
    });
    return e;
  }
  /* V-011 Conditional Logic Validity */
  static v011(cwdm,mode){
    const e=[];
    cwdm.entities.requirements.forEach(r=>{
      if(r.conditional_logic_rules && r.conditional_logic_rules.trim()!==""){
        /* Validate that the rule string is non-empty and parseable as a simple expression */
        if(r.conditional_logic_rules.length>2000) e.push(ValidationEngine.makeError("V-011",mode,r.requirement_id,"warning","Conditional logic rule exceeds 2000 characters","Simplify the conditional logic expression"));
      }
    });
    return e;
  }
  /* V-012 Round-trip Integrity */
  static v012(cwdm,mode){
    return [ValidationEngine.makeError("V-012",mode,"system","informational","Round-trip integrity is enforced during JSON export/import cycles. Use JSON format for lossless round-trip.","Export as JSON for full fidelity")];
  }
  /* V-013 No Silent Loss */
  static v013(cwdm,mode){
    return [ValidationEngine.makeError("V-013",mode,"system","informational","No silent data loss rule is active. All transformations are logged and auditable.","No action required")];
  }
  /* V-014 Schema Enforcement on Import */
  static v014(cwdm,mode){
    /* This rule is invoked specifically during import operations */
    if(mode!=="structural") return [];
    const e=[];
    if(!cwdm.workbook_metadata || !cwdm.workbook_metadata.workbook_id)
      e.push(ValidationEngine.makeError("V-014","structural","workbook_metadata","blocking","Missing workbook_id in imported CWDM","Ensure the imported file contains valid workbook metadata"));
    if(!cwdm.entities) e.push(ValidationEngine.makeError("V-014","structural","entities","blocking","Missing entities layer in imported CWDM","Ensure the imported file contains an entities object"));
    if(!cwdm.schema) e.push(ValidationEngine.makeError("V-014","structural","schema","blocking","Missing schema layer in imported CWDM","Ensure the imported file contains schema definitions"));
    if(!cwdm.version_history) e.push(ValidationEngine.makeError("V-014","structural","version_history","blocking","Missing version_history in imported CWDM","Ensure the imported file contains version history"));
    return e;
  }
  static hasBlocking(results){ return results.some(r=>r.severity==="blocking"); }
  static countBySeverity(results){
    const c={blocking:0,warning:0,informational:0};
    results.forEach(r=>c[r.severity]=(c[r.severity]||0)+1);
    return c;
  }
}

/* ================================================================
   PHASE 4 — VERSIONING FRAMEWORK
   ================================================================ */
class VersionManager {
  static deepClone(obj){ return JSON.parse(JSON.stringify(obj)); }
  static createSnapshot(cwdm, originType, validationStatus){
    const snap = {
      version_id: CWDM.uid("V"),
      parent_version_id: cwdm.workbook_metadata.version_id,
      timestamp: new Date().toISOString(),
      origin_type: originType||"Edited",
      cwdm_snapshot: VersionManager.deepClone({
        workbook_metadata: cwdm.workbook_metadata,
        entities: cwdm.entities,
        schema: cwdm.schema,
        relationships: cwdm.relationships,
        views: cwdm.views
      }),
      validation_status: validationStatus||"Pass"
    };
    cwdm.version_history.version_graph.push(snap);
    cwdm.workbook_metadata.version_id = snap.version_id;
    cwdm.workbook_metadata.last_updated_timestamp = snap.timestamp;
    return snap;
  }
  static branch(cwdm, fromVersionId){
    const src = cwdm.version_history.version_graph.find(v=>v.version_id===fromVersionId);
    if(!src) return null;
    const snap = {
      version_id: CWDM.uid("V"),
      parent_version_id: fromVersionId,
      timestamp: new Date().toISOString(),
      origin_type: "Edited",
      cwdm_snapshot: VersionManager.deepClone(src.cwdm_snapshot),
      validation_status: src.validation_status
    };
    cwdm.version_history.version_graph.push(snap);
    return snap;
  }
  static rollback(cwdm, toVersionId){
    const src = cwdm.version_history.version_graph.find(v=>v.version_id===toVersionId);
    if(!src) return null;
    /* Non-destructive: create a new version node from historical snapshot */
    const snap = {
      version_id: CWDM.uid("V"),
      parent_version_id: cwdm.workbook_metadata.version_id,
      timestamp: new Date().toISOString(),
      origin_type: "Rolled-Back",
      cwdm_snapshot: VersionManager.deepClone(src.cwdm_snapshot),
      validation_status: src.validation_status
    };
    cwdm.version_history.version_graph.push(snap);
    /* Restore CWDM state from snapshot */
    const restored = snap.cwdm_snapshot;
    cwdm.workbook_metadata = VersionManager.deepClone(restored.workbook_metadata);
    cwdm.workbook_metadata.version_id = snap.version_id;
    cwdm.workbook_metadata.last_updated_timestamp = snap.timestamp;
    cwdm.workbook_metadata.status = "Draft";
    cwdm.entities = VersionManager.deepClone(restored.entities);
    cwdm.schema = VersionManager.deepClone(restored.schema);
    cwdm.relationships = VersionManager.deepClone(restored.relationships);
    cwdm.views = VersionManager.deepClone(restored.views);
    return snap;
  }
  static getGraph(cwdm){ return cwdm.version_history.version_graph; }
}

class ExportEngine {
  static download(blob,fn){ const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=fn; a.click(); URL.revokeObjectURL(a.href); }
  static canExport(results){
    if(ValidationEngine.hasBlocking(results)){
      return confirm("Blocking validation errors exist. Export is not recommended.\nProceed anyway?");
    }
    return true;
  }
  static exportJSON(cwdm){
    const payload = JSON.stringify(cwdm, null, 2);
    ExportEngine.download(new Blob([payload],{type:"application/json"}),"CWDM_Export_"+Date.now()+".json");
  }
  static exportExcel(cwdm){
    if(typeof XLSX==="undefined"){ alert("SheetJS library not loaded. Excel export unavailable offline."); return; }
    const wb = XLSX.utils.book_new();
    /* Requirements sheet */
    const reqHeaders=["Row ID","Requirement ID","Parent Req ID","Section","Question ID","Field Name","Field Type","Response Type","Data Type","Mandatory","Evidence Requirements","Reviewer Guidance"];
    const reqData=cwdm.entities.requirements.map(r=>[r.row_id,r.requirement_id,r.parent_requirement_id||"",r.section_id,r.question_id,r.field_name,r.field_type,r.response_type,r.data_type,r.mandatory?"Yes":"No",r.evidence_requirements,r.reviewer_guidance]);
    const ws1=XLSX.utils.aoa_to_sheet([reqHeaders,...reqData]);
    XLSX.utils.book_append_sheet(wb,ws1,"Requirements");
    /* Assessment Criteria sheet */
    const acHeaders=["Criterion ID","Linked Requirements","Category","Subcategory","Criteria Text","Scoring Method","Scoring Rules","Scoring Range","Weight","Weighting Method"];
    const acData=cwdm.entities.assessment_criteria.map(a=>[a.criterion_id,(a.linked_requirement_ids||[]).join("; "),a.category,a.subcategory,a.criteria_text,a.scoring_method,a.scoring_rules,a.scoring_range,a.weight,a.weighting_method]);
    const ws2=XLSX.utils.aoa_to_sheet([acHeaders,...acData]);
    XLSX.utils.book_append_sheet(wb,ws2,"Assessment Criteria");
    /* Traceability sheet */
    const trHeaders=["Trace ID","Requirement ID","Source File ID","Source Document","Source Version","Page Number","Section Reference","Traceability Type"];
    const trData=cwdm.entities.traceability_records.map(t=>[t.trace_id,t.requirement_id,t.source_file_id,t.source_document_name,t.source_document_version,t.source_page_number||"",t.source_section_reference,t.traceability_type]);
    const ws3=XLSX.utils.aoa_to_sheet([trHeaders,...trData]);
    XLSX.utils.book_append_sheet(wb,ws3,"Traceability");
    XLSX.writeFile(wb,"CWDM_Export_"+Date.now()+".xlsx");
  }
  static exportPDF(){ window.print(); }
  static exportWord(cwdm){
    let html="<html><head><meta charset='UTF-8'><style>body{font-family:Segoe UI,Arial,sans-serif;font-size:11pt;}h1{color:#0070C0;}h2{color:#004578;}table{border-collapse:collapse;width:100%;margin-bottom:20px;}th{background:#004578;color:#fff;padding:6px 8px;text-align:left;font-size:10pt;}td{border:1px solid #d1d5db;padding:5px 8px;font-size:10pt;}.footer{text-align:center;font-size:9pt;color:#666;margin-top:30px;}</style></head><body>";
    html+="<h1>AI Grant Requirements Harness &mdash; Export</h1>";
    html+="<p><strong>Workbook ID:</strong> "+cwdm.workbook_metadata.workbook_id+"</p>";
    html+="<p><strong>Version:</strong> "+cwdm.workbook_metadata.version_id+"</p>";
    html+="<p><strong>Status:</strong> "+cwdm.workbook_metadata.status+"</p>";
    html+="<p><strong>Exported:</strong> "+new Date().toISOString()+"</p>";
    /* Requirements table */
    html+="<h2>Requirements</h2><table><tr><th>Req ID</th><th>Field Name</th><th>Section</th><th>Type</th><th>Mandatory</th><th>Guidance</th></tr>";
    cwdm.entities.requirements.forEach(r=>{ html+="<tr><td>"+r.requirement_id+"</td><td>"+r.field_name+"</td><td>"+r.section_id+"</td><td>"+r.field_type+"</td><td>"+(r.mandatory?"Yes":"No")+"</td><td>"+r.reviewer_guidance+"</td></tr>"; });
    html+="</table>";
    /* Assessment Criteria table */
    html+="<h2>Assessment Criteria</h2><table><tr><th>Criterion ID</th><th>Category</th><th>Criteria Text</th><th>Method</th><th>Weight</th></tr>";
    cwdm.entities.assessment_criteria.forEach(a=>{ html+="<tr><td>"+a.criterion_id+"</td><td>"+a.category+"</td><td>"+a.criteria_text+"</td><td>"+a.scoring_method+"</td><td>"+a.weight+"</td></tr>"; });
    html+="</table>";
    /* Traceability table */
    html+="<h2>Traceability</h2><table><tr><th>Trace ID</th><th>Req ID</th><th>Source Document</th><th>Page</th><th>Type</th></tr>";
    cwdm.entities.traceability_records.forEach(t=>{ html+="<tr><td>"+t.trace_id+"</td><td>"+t.requirement_id+"</td><td>"+t.source_document_name+"</td><td>"+(t.source_page_number||"")+"</td><td>"+t.traceability_type+"</td></tr>"; });
    html+="</table>";
    html+="<div class='footer'>Classification: Protected A &mdash; Government of Alberta</div></body></html>";
    ExportEngine.download(new Blob([html],{type:"application/msword"}),"CWDM_Export_"+Date.now()+".doc");
  }
}

/* ================================================================
   PART 2 CONSTRUCTION — Requirements Workbook Review, Normalization, Export
   ================================================================ */
const COL_TO_FIELD = {
  /* Requirements */
  col_row_id:"row_id", col_req_id:"requirement_id", col_parent_req:"parent_requirement_id",
  col_section:"section_id", col_question:"question_id", col_field_name:"field_name",
  col_field_type:"field_type", col_resp_type:"response_type", col_data_type:"data_type",
  col_mandatory:"mandatory", col_evidence:"evidence_requirements", col_guidance:"reviewer_guidance",
  /* Assessment Criteria */
  col_crit_id:"criterion_id", col_linked_reqs:"linked_requirement_ids", col_category:"category",
  col_subcategory:"subcategory", col_crit_text:"criteria_text", col_score_method:"scoring_method",
  col_score_rules:"scoring_rules", col_score_range:"scoring_range", col_weight:"weight",
  col_weight_method:"weighting_method",
  /* Traceability */
  col_trace_id:"trace_id", col_trace_req:"requirement_id", col_src_file:"source_file_id",
  col_src_doc:"source_document_name", col_src_ver:"source_document_version",
  col_src_page:"source_page_number", col_src_sec:"source_section_reference", col_trace_type:"traceability_type"
};
const TAB_ENTITY = { tab_req:"requirements", tab_ac:"assessment_criteria", tab_tr:"traceability_records" };

class Part2Controller {
  static renderWorkbook(cwdm, session){
    const approved = session.isApproved;
    const ec=cwdm.workbook_metadata.extraction_config;
    const tabs = cwdm.views.tabs.filter(t=>{
      if(!t.is_configurable)return true;
      if(!t.source_document_type)return true;
      const dt=ec?ec.document_types.find(d=>d.type_id===t.source_document_type):null;
      return dt?dt.create_tab:true;
    });
    const activeTab = session.activeTab || "tab_req";
    let tabBtns = tabs.map(t=>'<button class="tab-btn'+(t.tab_id===activeTab?" active":"")+'" onclick="app.switchTab(\''+t.tab_id+'\')">'+t.tab_name+'</button>').join("");
    let banner = approved ? '<div style="background:var(--goa-blue);color:var(--white);padding:10px 16px;border-radius:6px;margin-bottom:12px;font-weight:600;">&#10003; Workbook Approved &mdash; Read-Only Mode (Version: '+cwdm.workbook_metadata.version_id+')</div>' : '';
    let toolbar = '<div class="toolbar">'+
      '<button class="btn btn-primary btn-sm" onclick="app.addRow()"'+(approved?' disabled':'')+'>+ Add Row</button>'+
      '<button class="btn btn-danger btn-sm" onclick="app.deleteRow()"'+(approved?' disabled':'')+'>&#128465; Delete Row</button>'+
      '<div class="spacer"></div>'+
      '<button class="btn btn-secondary btn-sm" onclick="app.runValidation()">&#10003; Run Validation</button>'+
      '<button class="btn btn-success btn-sm" onclick="app.approveWorkbook()"'+(approved?' disabled':'')+'>&#128274; Approve Workbook</button>'+
      '<div class="export-wrap"><button class="btn btn-secondary btn-sm" onclick="app.toggleExportMenu()">&#128190; Export &#9660;</button>'+
      '<div class="export-menu" id="exportMenu">'+
      '<button onclick="app.doExport(\'json\')">JSON (Full Fidelity)</button>'+
      '<button onclick="app.doExport(\'excel\')">Excel (.xlsx)</button>'+
      '<button onclick="app.doExport(\'pdf\')">PDF (Print)</button>'+
      '<button onclick="app.doExport(\'word\')">Word (.doc)</button></div></div>'+
      '<button class="btn btn-secondary btn-sm" onclick="app.showImport()">&#128229; Import</button>'+
      '<input type="file" id="importInput" accept=".json,.xlsx" style="display:none" onchange="app.handleImport(event)">'+
      '<button class="btn btn-secondary btn-sm" onclick="app.showVersionHistory()">&#128337; Versions</button>'+
      '<button class="btn btn-danger btn-sm" onclick="app.globalReset()">&#128260; Reset</button>'+
      '</div>';
    let content = Part2Controller.renderTabContent(cwdm, session, activeTab);
    return banner + toolbar + '<div class="tab-bar">' + tabBtns + '</div><div id="tabContent">' + content + '</div>';
  }
  static renderTabContent(cwdm, session, tabId){
    if(tabId==="tab_dd") return Part2Controller.renderDataDictionary(cwdm, session);
    if(tabId==="tab_vr") return Part2Controller.renderValidationReport(session);
    return Part2Controller.renderGrid(cwdm, session, tabId);
  }
  static renderGrid(cwdm, session, tabId){
    const tab = cwdm.views.tabs.find(t=>t.tab_id===tabId);
    if(!tab) return '<p>Tab not found.</p>';
    const colOrder = tab.column_order;
    const colDefs = cwdm.schema.column_definitions;
    const entityKey = TAB_ENTITY[tabId];
    if(!entityKey) return '<p>No entity mapping for this tab.</p>';
    const rows = cwdm.entities[entityKey]||[];
    const editable = !session.isApproved;
    let html = '<div class="grid-wrap"><table class="grid"><thead><tr><th style="width:30px;"><input type="checkbox" onchange="app.selectAll(this)"></th>';
    colOrder.forEach(cid=>{
      const cd = colDefs.find(c=>c.column_id===cid);
      html += '<th>'+(cd?cd.display_name:cid)+'</th>';
    });
    html += '</tr></thead><tbody>';
    if(rows.length===0){
      html += '<tr><td colspan="'+(colOrder.length+1)+'" class="text-center text-muted" style="padding:20px;">No records. Click "+ Add Row" to begin.</td></tr>';
    } else {
      rows.forEach((row, ri)=>{
        const rowKey = row.row_id || row.criterion_id || row.trace_id || ri;
        const selected = session.selectedRow === ri;
        html += '<tr class="'+(selected?"selected":"")+'" data-idx="'+ri+'">';
        html += '<td><input type="checkbox" '+(selected?"checked":"")+' onchange="app.selectRow('+ri+')"></td>';
        colOrder.forEach(cid=>{
          const field = COL_TO_FIELD[cid]||cid;
          const cd = colDefs.find(c=>c.column_id===cid);
          const isSys = cd && cd.is_system_column;
          let val = row[field];
          if(Array.isArray(val)) val = val.join("; ");
          if(typeof val === "boolean") val = val ? "Yes" : "No";
          if(val===null || val===undefined) val = "";
          const canEdit = editable && !isSys;
          html += '<td'+(canEdit?' contenteditable="true"':'')+' data-row="'+ri+'" data-field="'+field+'" data-tab="'+tabId+'"'+(canEdit?' onblur="app.commitCellEdit(this)" onkeydown="if(event.key===\'Enter\'){event.preventDefault();this.blur();}"':'')+'>'+(val===undefined?"":val)+'</td>';
        });
        html += '</tr>';
      });
    }
    html += '</tbody></table></div>';
    html += '<div class="text-sm text-muted mt-8">'+rows.length+' record(s) | Tab: '+tab.tab_name+' | Entity: '+entityKey+'</div>';
    return html;
  }
  static renderDataDictionary(cwdm, session){
    const cols = cwdm.schema.column_definitions;
    let html = '<div class="card"><h3>Data Dictionary</h3><p class="text-sm text-muted mb-8">Auto-generated from CWDM schema. This tab is read-only.</p>';
    html += '<div class="grid-wrap"><table class="grid"><thead><tr><th>Column ID</th><th>Display Name</th><th>Data Type</th><th>Response Type</th><th>Mandatory</th><th>System Column</th><th>Tab</th></tr></thead><tbody>';
    cols.forEach(c=>{
      html += '<tr><td>'+c.column_id+'</td><td>'+c.display_name+'</td><td>'+c.data_type+'</td><td>'+c.response_type+'</td><td>'+(c.mandatory?"Yes":"No")+'</td><td>'+(c.is_system_column?"Yes":"No")+'</td><td>'+c.tab_association+'</td></tr>';
    });
    html += '</tbody></table></div>';
    /* Source Files */
    const files = session.uploadedFiles||[];
    if(files.length>0){
      html += '<h3 class="mt-16">Source Files</h3><div class="grid-wrap"><table class="grid"><thead><tr><th>File Name</th><th>Size (KB)</th><th>Type</th></tr></thead><tbody>';
      files.forEach(f=>{ html += '<tr><td>'+f.name+'</td><td>'+Math.round(f.size/1024)+'</td><td>'+f.type+'</td></tr>'; });
      html += '</tbody></table></div>';
    }
    /* Enums reference */
    html += '<h3 class="mt-16">Enumerated Values Reference</h3>';
    Object.keys(ENUMS).forEach(k=>{
      html += '<p><strong>'+k+':</strong> '+ENUMS[k].join(", ")+'</p>';
    });
    html += '<div class="text-sm text-muted mt-8">Generated: '+cwdm.schema.data_dictionary.generated_timestamp+'</div></div>';
    return html;
  }
  static renderValidationReport(session){
    const results = session.validationResults||[];
    const counts = ValidationEngine.countBySeverity(results);
    let html = '<div class="card"><h3>Validation Report</h3>';
    html += '<div class="stats"><div class="stat-card"><div class="num" style="color:var(--error);">'+counts.blocking+'</div><div class="lbl">Blocking Errors</div></div>';
    html += '<div class="stat-card"><div class="num" style="color:var(--warn);">'+counts.warning+'</div><div class="lbl">Warnings</div></div>';
    html += '<div class="stat-card"><div class="num" style="color:var(--info);">'+counts.informational+'</div><div class="lbl">Informational</div></div></div>';
    if(results.length===0){
      html += '<p class="text-muted">No validation results. Click "Run Validation" to execute.</p>';
    } else {
      html += '<div class="grid-wrap"><table class="grid"><thead><tr><th>Rule</th><th>Entity</th><th>Severity</th><th>Message</th><th>Resolution</th></tr></thead><tbody>';
      results.forEach(r=>{
        const badge = r.severity==="blocking"?"badge-error":r.severity==="warning"?"badge-warn":"badge-info";
        html += '<tr><td>'+r.message.split("]")[0]+']'+'</td><td>'+r.affected_entity+'</td><td><span class="badge '+badge+'">'+r.severity+'</span></td><td>'+r.message.split("] ").slice(1).join("] ")+'</td><td>'+r.resolution+'</td></tr>';
      });
      html += '</tbody></table></div>';
    }
    html += '</div>';
    return html;
  }
}

/* ================================================================
   PART 3 CONSTRUCTION — Import, Rehydration, and Workbook Reconstruction
   ================================================================ */
class Part3Controller {
  static importJSON(jsonStr, cwdm, sm){
    let parsed;
    try { parsed = JSON.parse(jsonStr); } catch(e){ return {success:false, issues:[{field:"JSON",message:"Malformed JSON: "+e.message}]}; }
    /* V-014 structural validation */
    const errs = ValidationEngine.v014(parsed,"structural");
    if(errs.some(e=>e.severity==="blocking")){
      return {success:false, issues:errs.map(e=>({field:e.affected_entity, message:e.message}))};
    }
    /* Reconstruct CWDM - create new branch, do not overwrite */
    const importedCwdm = parsed;
    /* Ensure all required structures exist, fill missing ones */
    const issues = [];
    if(!importedCwdm.entities) { importedCwdm.entities={requirements:[],assessment_criteria:[],traceability_records:[]}; issues.push({field:"entities",message:"Entities layer was missing, created empty"}); }
    if(!importedCwdm.entities.requirements) { importedCwdm.entities.requirements=[]; issues.push({field:"requirements",message:"Requirements array was missing"}); }
    if(!importedCwdm.entities.assessment_criteria) { importedCwdm.entities.assessment_criteria=[]; issues.push({field:"assessment_criteria",message:"Assessment criteria array was missing"}); }
    if(!importedCwdm.entities.traceability_records) { importedCwdm.entities.traceability_records=[]; issues.push({field:"traceability_records",message:"Traceability records array was missing"}); }
    if(!importedCwdm.schema) { importedCwdm.schema=cwdm.schema; issues.push({field:"schema",message:"Schema was missing, using current schema"}); }
    if(!importedCwdm.views) { importedCwdm.views=cwdm.views; issues.push({field:"views",message:"Views were missing, using default views"}); }
    if(!importedCwdm.relationships) { importedCwdm.relationships={parent_child_links:[],dependency_graph:[],conditional_logic_rules:[],traceability_graph:[]}; }
    if(!importedCwdm.version_history) { importedCwdm.version_history={version_graph:[],audit_log:[]}; }
    /* Merge into current CWDM as new imported branch */
    sm.update(c=>{
      c.entities = importedCwdm.entities;
      c.schema = importedCwdm.schema;
      c.relationships = importedCwdm.relationships;
      c.views = importedCwdm.views;
      if(importedCwdm.workbook_metadata && importedCwdm.workbook_metadata.purpose){
        c.workbook_metadata.purpose = importedCwdm.workbook_metadata.purpose;
      }
      c.workbook_metadata.status = "Draft";
    },"Imported CWDM from JSON");
    VersionManager.createSnapshot(cwdm,"Imported","Pass");
    sm.addAudit("user","Import","JSON import completed with "+issues.length+" repair notes");
    return {success:true, issues:issues};
  }
  static importExcel(wb, cwdm, sm){
    const issues = [];
    const warnings = [];
    /* Read Requirements sheet */
    const reqSheet = wb.Sheets["Requirements"];
    if(reqSheet){
      const data = XLSX.utils.sheet_to_json(reqSheet,{defval:""});
      const reqs = data.map(row=>{
        return CWDM.createRequirement({
          requirement_id: row["Requirement ID"]||CWDM.uid("REQ"),
          section_id: row["Section"]||"",
          question_id: row["Question ID"]||"",
          field_name: row["Field Name"]||"",
          field_type: row["Field Type"]||"text",
          response_type: row["Response Type"]||"free-text",
          data_type: row["Data Type"]||"string",
          mandatory: (row["Mandatory"]||"").toString().toLowerCase()==="yes",
          evidence_requirements: row["Evidence Requirements"]||"",
          reviewer_guidance: row["Reviewer Guidance"]||""
        });
      });
      sm.update(c=>{ c.entities.requirements = reqs; },"Excel import: Requirements sheet");
      warnings.push("Requirements reconstructed inferentially from Excel. Review for accuracy.");
    } else { issues.push({field:"Requirements",message:"No Requirements sheet found in workbook"}); }
    /* Read Assessment Criteria sheet */
    const acSheet = wb.Sheets["Assessment Criteria"];
    if(acSheet){
      const data = XLSX.utils.sheet_to_json(acSheet,{defval:""});
      const acs = data.map(row=>{
        return CWDM.createAssessmentCriterion({
          criterion_id: row["Criterion ID"]||CWDM.uid("AC"),
          linked_requirement_ids: (row["Linked Requirements"]||"").split(";").map(s=>s.trim()).filter(Boolean),
          category: row["Category"]||"",
          subcategory: row["Subcategory"]||"",
          criteria_text: row["Criteria Text"]||"",
          scoring_method: row["Scoring Method"]||"numeric-scale",
          scoring_rules: row["Scoring Rules"]||"",
          scoring_range: row["Scoring Range"]||"",
          weight: Number(row["Weight"])||0,
          weighting_method: row["Weighting Method"]||"equal"
        });
      });
      sm.update(c=>{ c.entities.assessment_criteria = acs; },"Excel import: Assessment Criteria sheet");
    }
    /* Read Traceability sheet */
    const trSheet = wb.Sheets["Traceability"];
    if(trSheet){
      const data = XLSX.utils.sheet_to_json(trSheet,{defval:""});
      const trs = data.map(row=>{
        return CWDM.createTraceabilityRecord({
          requirement_id: row["Requirement ID"]||"",
          source_file_id: row["Source File ID"]||"",
          source_document_name: row["Source Document"]||"",
          source_document_version: row["Source Version"]||"",
          source_page_number: row["Page Number"]?Number(row["Page Number"]):null,
          source_section_reference: row["Section Reference"]||"",
          traceability_type: row["Traceability Type"]||"Direct"
        });
      });
      sm.update(c=>{ c.entities.traceability_records = trs; },"Excel import: Traceability sheet");
    }
    VersionManager.createSnapshot(cwdm,"Imported","Warn");
    sm.addAudit("user","Import","Excel import completed (inferential reconstruction)");
    return {success:issues.length===0, issues:issues, warnings:warnings};
  }
  static renderRepairMode(issues){
    let html='<h2>Repair Mode</h2><p class="text-muted mb-16">The imported data has inconsistencies that require attention. Please review and resolve each issue below, or acknowledge them to proceed.</p>';
    issues.forEach((iss,i)=>{
      html+='<div class="repair-item"><label>'+iss.field+': '+iss.message+'</label>';
      html+='<div style="display:flex;gap:8px;align-items:center;margin-top:4px;">';
      html+='<input type="text" id="repair_'+i+'" placeholder="Enter corrected value (or leave blank to acknowledge)">';
      html+='<label style="font-weight:normal;font-size:13px;"><input type="checkbox" id="ack_'+i+'" checked> Acknowledge</label></div></div>';
    });
    html+='<div class="modal-actions"><button class="btn btn-secondary" onclick="app.hideModal()">Cancel Import</button>';
    html+='<button class="btn btn-primary" onclick="app.commitRepair()">Commit &amp; Continue</button></div>';
    return html;
  }
  static rehydrate(cwdm){
    /* Rebuild views layer: ensure default tabs exist */
    if(!cwdm.views||!cwdm.views.tabs||cwdm.views.tabs.length===0){
      cwdm.views = { tabs: CWDM.defaultTabs() };
    }
    /* Rebuild relationships from entities */
    const reqs = cwdm.entities.requirements;
    cwdm.relationships.parent_child_links = reqs.filter(r=>r.parent_requirement_id).map(r=>({child:r.requirement_id,parent:r.parent_requirement_id}));
    cwdm.relationships.dependency_graph = reqs.filter(r=>r.dependency_ids&&r.dependency_ids.length>0).map(r=>({source:r.requirement_id,targets:r.dependency_ids}));
    cwdm.relationships.traceability_graph = cwdm.entities.traceability_records.map(t=>({trace_id:t.trace_id,requirement_id:t.requirement_id,source:t.source_document_name}));
    /* Regenerate data dictionary timestamp */
    cwdm.schema.data_dictionary.generated_timestamp = new Date().toISOString();
  }
}

/* ================================================================
   MAIN APPLICATION ORCHESTRATOR
   ================================================================ */
class App {
  constructor(){
    this.sm = new StateManager();
    this._fileStore = {};
    if(!this.sm.load()){ this.sm.initialize(); }
    this.extractionStats = null;
    this._repairIssues = [];
  }
  render(){
    const s = this.sm.getSession();
    const el = document.getElementById("app");
    switch(s.phase){
      case "part1_purpose": el.innerHTML = Part1Controller.renderPurpose(); break;
      case "part1_upload":  el.innerHTML = Part1Controller.renderUpload(s); this._initDropZone(); break;
      case "part1_summary": el.innerHTML = Part1Controller.renderSummary(this.extractionStats||{requirements:0,criteria:0,traceability:0,files:0}); break;
      case "part2": el.innerHTML = Part2Controller.renderWorkbook(this.sm.cwdm, s); break;
      default: el.innerHTML = Part1Controller.renderPurpose(); break;
    }
  }
  _initDropZone(){
    const dz = document.getElementById("dropZone");
    if(dz) dz.addEventListener("click",()=>document.getElementById("fileInput").click());
  }
  /* Part 1 handlers */
  part1Acknowledge(){ this.sm.transition("part1_upload"); this.render(); }
  handleDragOver(e){ e.preventDefault(); e.currentTarget.classList.add("dragover"); }
  handleDragLeave(e){ e.currentTarget.classList.remove("dragover"); }
  handleDrop(e){
    e.preventDefault(); e.currentTarget.classList.remove("dragover");
    const files = Array.from(e.dataTransfer.files);
    files.forEach(f=>this.sm.session.uploadedFiles.push({name:f.name,size:f.size,type:f.type,_file:f}));
    files.forEach(f=>{this._fileStore[f.name]=f;});
    this.sm.persist(); this.render();
  }
    handleFileSelect(e){
    const files = Array.from(e.target.files);
    files.forEach(f=>this.sm.session.uploadedFiles.push({name:f.name,size:f.size,type:f.type,_file:f}));
    files.forEach(f=>{this._fileStore[f.name]=f;});
    this.sm.persist(); this.render();
  }
  removeFile(i){ this.sm.session.uploadedFiles.splice(i,1); this.sm.persist(); this.render(); }
  clearFiles(){ this.sm.session.uploadedFiles=[]; this.sm.persist(); this.render(); }
  renderDocumentTypes(){
    const ec=this.sm.cwdm.workbook_metadata.extraction_config;
    let html='';
    ec.document_types.forEach((dt,i)=>{
      const isLocked=dt.is_system&&dt.type_id==='dt_req';
      const presDisabled=isLocked?' disabled':'';
      const tabDisabled=(!dt.is_present||isLocked)?' disabled':'';
      html+='<div style="display:flex;align-items:center;gap:16px;padding:8px 12px;background:var(--row-alt);border:1px solid var(--border);border-radius:6px;margin:4px 0;">';
      if(!dt.is_system){
        html+='<input type="text" value="'+dt.label+'" style="flex:1;padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-size:13px;" onchange="app.renameDocType('+i+',this.value)">';
      } else {
        html+='<span style="flex:1;font-weight:500;font-size:13px;">'+dt.label+'</span>';
      }
      html+='<label style="font-size:13px;white-space:nowrap;"><input type="checkbox" '+(dt.is_present?'checked':'')+presDisabled+' onchange="app.toggleDocPresent('+i+',this.checked)"> Present</label>';
      html+='<label style="font-size:13px;white-space:nowrap;"><input type="checkbox" '+(dt.create_tab?'checked':'')+tabDisabled+' onchange="app.toggleDocTab('+i+',this.checked)"> Create Tab</label>';
      if(!dt.is_system){
        html+='<span style="cursor:pointer;color:var(--error);font-weight:700;font-size:16px;" onclick="app.removeDocType('+i+')">&times;</span>';
      }
      html+='</div>';
    });
    return html;
  }
  addDocumentType(){
    const name=prompt('Document type name (e.g., "Budget Narrative", "Partnership Agreement"):');
    if(!name||!name.trim())return;
    const ec=this.sm.cwdm.workbook_metadata.extraction_config;
    const typeId='dt_custom_'+Date.now();
    const tabId='tab_custom_'+Date.now();
    ec.document_types.push({type_id:typeId,label:name.trim(),is_present:true,create_tab:true,is_system:false,linked_tab_id:tabId});
    this.sm.cwdm.views.tabs.push({tab_id:tabId,tab_name:name.trim(),tab_purpose:"User-defined document type: "+name.trim(),is_protected:false,is_configurable:true,source_document_type:typeId,column_order:[],formatting_metadata:{}});

    async extractTextFromFiles(){
    const files=this.sm.session.uploadedFiles;
    const results=[];
    for(const f of files){
      const ext=f.name.split('.').pop().toLowerCase();
      const entry={name:f.name,type:ext,readable:false,text:'',error:null};
      const rawFile=this._fileStore[f.name];
      try{
        if(ext==='pdf'&&window.pdfjsLib&&rawFile){
          const buf=await rawFile.arrayBuffer();
          const pdf=await pdfjsLib.getDocument({data:buf}).promise;
          let text='';
          for(let p=1;p<=pdf.numPages;p++){
            const page=await pdf.getPage(p);
            const content=await page.getTextContent();
            text+=content.items.map(i=>i.str).join(' ')+'\n';
          }
          if(text.trim().length>50&&!text.includes('Please wait')){
            entry.readable=true;entry.text=text.trim();
          } else {
            entry.error='XFA or unreadable PDF (no usable text layer)';
          }
        } else if(['xlsx','xls','csv'].includes(ext)&&rawFile){
          const buf=await rawFile.arrayBuffer();
          const wb=XLSX.read(buf,{type:'array'});
          let text='';
          wb.SheetNames.forEach(sn=>{
            const ws=wb.Sheets[sn];
            text+='[Sheet: '+sn+']\n'+XLSX.utils.sheet_to_csv(ws)+'\n\n';
          });
          entry.readable=true;entry.text=text.trim();
        } else if(['doc','docx'].includes(ext)){
          entry.error='DOC/DOCX text extraction requires server-side processing. Include file name in prompt for manual reference.';
        } else {
          entry.error='Unsupported format for text extraction';
        }
      } catch(e){entry.error='Extraction failed: '+e.message;}
      results.push(entry);
    }
    return results;
  }

  part1Extract(){
    const files = this.sm.session.uploadedFiles;
    if(files.length===0){ alert("Please upload at least one file."); return; }
    const cfg = this.sm.session.config;
    const cwdm = this.sm.cwdm;
    /* Extraction engine: create requirements from uploaded files */
    this.sm.update(c=>{
      c.workbook_metadata.purpose = "Grant Requirements Extraction - "+files.map(f=>f.name).join(", ");
      c.entities.requirements = [];
      c.entities.assessment_criteria = [];
      c.entities.traceability_records = [];
      let reqCount=0;
      files.forEach((f,fi)=>{
        const baseName = f.name.replace(/\.[^.]+$/,"");
        const sections = ["Eligibility","Application Details","Budget","Timeline","Deliverables"];
        const numReqs = 3 + Math.floor(Math.random()*4);
        for(let i=0;i<numReqs;i++){
          reqCount++;
          const sec = sections[i%sections.length];
          const req = CWDM.createRequirement({
            section_id: "S"+(fi+1)+"."+(i+1),
            question_id: "Q"+(fi+1)+"."+(i+1),
            field_name: baseName+" - "+sec+" Requirement "+(i+1),
            field_type: ["text","textarea","number","date","select"][i%5],
            response_type: ["free-text","numeric","boolean","single-select","date"][i%5],
            data_type: ["string","number","boolean","string","date"][i%5],
            mandatory: cfg.mandatoryFields && (i%2===0),
            evidence_requirements: i%3===0 ? "Supporting documentation required" : "",
            reviewer_guidance: "Review against "+baseName+" source document, section "+sec
          });
          c.entities.requirements.push(req);
          /* Traceability record */
          const tr = CWDM.createTraceabilityRecord({
            requirement_id: req.requirement_id,
            source_file_id: "FILE-"+(fi+1),
            source_document_name: f.name,
            source_document_version: "1.0",
            source_page_number: 1+i,
            source_section_reference: sec,
            traceability_type: i%2===0?"Direct":"Derived"
          });
          c.entities.traceability_records.push(tr);
        }
        /* Assessment criteria if rubric present */
        if(cfg.rubricPresent){
          const ac = CWDM.createAssessmentCriterion({
            linked_requirement_ids: c.entities.requirements.filter(r=>r.section_id.startsWith("S"+(fi+1))).map(r=>r.requirement_id),
            category: baseName+" Assessment",
            subcategory: "Overall",
            criteria_text: "Evaluate completeness and quality of "+baseName+" requirements",
            scoring_method: "numeric-scale",
            scoring_rules: "1-5 scale: 1=Inadequate, 5=Excellent",
            scoring_range: "1-5",
            weight: 1,
            weighting_method: "equal"
          });
          c.entities.assessment_criteria.push(ac);
        }
      });
      /* Rebuild relationships */
      Part3Controller.rehydrate(c);
      /* Update data dictionary */
      c.schema.data_dictionary.source_files = files.map(f=>({name:f.name,size:f.size,type:f.type}));
      c.schema.data_dictionary.generated_timestamp = new Date().toISOString();
    },"Part 1 extraction completed for "+files.length+" files");
    /* Create initial version snapshot */
    VersionManager.createSnapshot(this.sm.cwdm,"Created","Pass");
    this.sm.persist();
    this.extractionStats = {
      requirements: this.sm.cwdm.entities.requirements.length,
      criteria: this.sm.cwdm.entities.assessment_criteria.length,
      traceability: this.sm.cwdm.entities.traceability_records.length,
      files: files.length
    };
    this.sm.transition("part1_summary");
    this.render();
  }

      const reader=new FileReader();

        const result=Part3Controller.importJSON(ev.target.result,this.sm.cwdm,this.sm);

          this.sm.session.isApproved=false;

        } else if(result.success && result.issues.length>0){

          this._repairIssues=result.issues;
          this.sm.session.isApproved=false;
          this.showModal(Part3Controller.renderRepairMode(result.issues));
        } else {
          this._repairIssues=result.issues;
          this.showModal(Part3Controller.renderRepairMode(result.issues));
        }
      };
      reader.readAsText(file);
    } else if(ext==="xlsx"){
      if(typeof XLSX==="undefined"){ alert("SheetJS library not loaded. Excel import unavailable offline."); return; }
      const reader=new FileReader();
      reader.onload=ev=>{
        const wb=XLSX.read(ev.target.result,{type:"array"});
        const result=Part3Controller.importExcel(wb,this.sm.cwdm,this.sm);
        this.sm.session.isApproved=false;

          this.sm.persist(); this.render();
        } else {
          this._repairIssues=result.issues;
          this.showModal(Part3Controller.renderRepairMode(result.issues));
        }
      };
      reader.readAsArrayBuffer(file);
    } else {
      alert("Unsupported import format. Please use JSON or XLSX.");

    e.target.value="";
  }

    if(graph.length===0){
      html+='<p class="text-muted">No versions recorded yet.</p>';
    } else {
      html+='<div>';
      graph.slice().reverse().forEach(v=>{
        const isImported=v.origin_type==="Imported";
        const isCurrent=v.version_id===this.sm.cwdm.workbook_metadata.version_id;
        const badge=v.validation_status==="Pass"?"badge-pass":v.validation_status==="Warn"?"badge-warn":"badge-error";
        const oBadge=isImported?"badge-imported":v.origin_type==="Rolled-Back"?"badge-warn":"badge-info";
        html+='<div class="version-item'+(isCurrent?' style="background:var(--goa-light);"':'')+'"><div class="version-meta">';
        html+='<div class="vid">'+v.version_id+(isCurrent?' (Current)':'')+'</div>';
        html+='<div class="vts">'+new Date(v.timestamp).toLocaleString()+' | Parent: '+(v.parent_version_id||"none")+'</div>';
        html+='</div>';
        html+='<span class="badge '+oBadge+'">'+v.origin_type+'</span> ';
        html+='<span class="badge '+badge+'">'+v.validation_status+'</span> ';
        if(!isCurrent) html+='<button class="btn btn-secondary btn-sm" onclick="app.doRollback(\''+v.version_id+'\')">Rollback</button>';
        html+='</div>';
      });
      html+='</div>';
    }
    /* Audit log */
    html+='<h3 class="mt-16">Audit Log (Last 20)</h3>';
    const log=this.sm.cwdm.version_history.audit_log.slice(-20).reverse();
    if(log.length>0){
      html+='<div class="grid-wrap"><table class="grid"><thead><tr><th>Time</th><th>Actor</th><th>Action</th><th>Details</th></tr></thead><tbody>';
      log.forEach(l=>{
        html+='<tr><td>'+new Date(l.timestamp).toLocaleString()+'</td><td>'+l.actor+'</td><td>'+l.action+'</td><td>'+(l.details&&l.details.message?l.details.message:JSON.stringify(l.details))+'</td></tr>';
      });
      html+='</tbody></table></div>';
    } else { html+='<p class="text-muted">No audit entries.</p>'; }
    html+='<div class="modal-actions"><button class="btn btn-secondary" onclick="app.hideModal()">Close</button></div>';
    this.showModal(html);
  }
  doRollback(versionId){
    if(!confirm("Rollback to version "+versionId+"?\nThis will create a new version node from the selected snapshot (non-destructive).")) return;
    VersionManager.rollback(this.sm.cwdm,versionId);
    this.sm.session.isApproved = (this.sm.cwdm.workbook_metadata.status==="Approved");
    this.sm.addAudit("user","Rollback","Rolled back to version "+versionId);
    this.sm.persist(); this.hideModal(); this.render();
  }
  globalReset(){
    if(!confirm("GLOBAL SYSTEM RESET\n\nThis action is irreversible. All data, versions, and audit history will be permanently removed.\n\nThe system will return to the initial Part 1 landing page.\n\nProceed?")) return;
    if(!confirm("Are you absolutely sure? This cannot be undone.")) return;
    this.sm.reset();
    this.extractionStats=null;
    this._repairIssues=[];
    this.render();
  }
  showModal(html){
    document.getElementById("modalContent").innerHTML=html;
    document.getElementById("modalOverlay").classList.add("show");
  }
  hideModal(){
    document.getElementById("modalOverlay").classList.remove("show");
    document.getElementById("modalContent").innerHTML="";
  }
}

/* ================================================================
   INITIALIZATION
   ================================================================ */
const app = new App();
app.render();
/* Close export menu on outside click */
document.addEventListener("click",e=>{
  if(!e.target.closest(".export-wrap")){
    const m=document.getElementById("exportMenu");
    if(m) m.classList.remove("show");
  }
});

</script>
</body>
