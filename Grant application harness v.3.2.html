  changeSort:function(mode){SM.ses.sortMode=mode;SM.persist();app.render()},
  runScan:function(){
    var files=SM.ccdm.entities.submission_files;
    if(files.length===0){alert('Upload submission files first.');return}
    SM.ccdm.entities.findings=[];
    SM.ccdm.entities.confidence_assessments=[];
    var pending=files.length;
    var totalFindings=0;
    files.forEach(function(sf){
      var file=SM._fileStore[sf.submission_file_id];
      if(!file){
        sf.processing_status='Error: File data unavailable';sf.scan_timestamp=new Date().toISOString();
        pending--;if(pending===0)app._finishScan();return;
      }
      var ext=sf.file_type;
      if(ext==='CSV'){
        var reader=new FileReader();
        reader.onload=function(ev){
          var text=ev.target.result;
          var lines=text.split('\n').map(function(l){return l.split(',').map(function(c){return c.trim().replace(/^"|"$/g,'')})});
          var headers=lines[0]||[];var rows=lines.slice(1).filter(function(r){return r.length>1||r[0]!==''});
          var findings=CE.scanFile(SM.ccdm,sf.submission_file_id,headers,rows);
          findings.forEach(function(f){f.file_name=sf.file_name});
          SM.ccdm.entities.findings=SM.ccdm.entities.findings.concat(findings);
          var ca=CE.calculateCompleteness(SM.ccdm,sf.submission_file_id);
          ca.file_name=sf.file_name;
          SM.ccdm.entities.confidence_assessments.push(ca);
          sf.processing_status='OK';sf.sheet_count=1;sf.scan_timestamp=new Date().toISOString();
          totalFindings+=findings.length;
          pending--;if(pending===0)app._finishScan();
        };
        reader.readAsText(file);
} else if(ext==='XLS'||ext==='XLSX'){
      var reader=new FileReader();
      reader.onload=function(ev){
        try{
          var wb=XLSX.read(ev.target.result,{type:'array'});
          sf.sheet_count=wb.SheetNames.length;
          var allFindings=[];
          wb.SheetNames.forEach(function(sn){
            var ws=wb.Sheets[sn];
            var data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
            var headers=(data[0]||[]).map(String);var rows=data.slice(1);
            var findings=CE.scanFile(SM.ccdm,sf.submission_file_id,headers,rows);
            findings.forEach(function(f){f.file_name=sf.file_name});
            allFindings=allFindings.concat(findings);
          });
          var best={};
          allFindings.forEach(function(f){
            var key=f.requirement_id;
            if(!best[key]||f.confidence_contribution>best[key].confidence_contribution)best[key]=f;
          });
          var deduped=Object.keys(best).map(function(k){return best[k]});
          SM.ccdm.entities.findings=SM.ccdm.entities.findings.concat(deduped);
          var ca=CE.calculateCompleteness(SM.ccdm,sf.submission_file_id);
          ca.file_name=sf.file_name;
          SM.ccdm.entities.confidence_assessments.push(ca);
          sf.processing_status='OK';sf.scan_timestamp=new Date().toISOString();
          totalFindings+=deduped.length;
        }catch(ex){sf.processing_status='Error: '+ex.message}
        pending--;if(pending===0)app._finishScan();
      };
      reader.readAsArrayBuffer(file);
    } else if((ext==='PDF')&&window.pdfjsLib&&sf.processing_status.indexOf('Readable')===0){
      /* PDF with readable text - section-aware matching */
      var reader=new FileReader();
      reader.onload=function(ev){
        pdfjsLib.getDocument({data:ev.target.result}).promise.then(function(pdf){
          var pagePromises=[];
          for(var p=1;p<=pdf.numPages;p++){
            pagePromises.push(pdf.getPage(p).then(function(page){
              return page.getTextContent().then(function(content){
                return content.items.map(function(item){return item.str}).join(' ');
              });
            }));
          }
          Promise.all(pagePromises).then(function(pages){
            var fullText=pages.join('\n');
            var reqs=SM.ccdm.requirements_baseline.requirements;
            var profs=SM.ccdm.requirements_baseline.field_profile;
            var findings=[];
            var placeholders=['n/a','-','na','tbd','select one','-select one-','null','none','0',''];
            var stopWords=['the','and','for','with','from','that','this','are','was','has','its','not','of','in','to','or','is','a','an','by','on','at','be'];

            /* ── Section detection ── */
            var sectionRegex=/section\s+([a-f])\s*[:\-–]/gi;
            var sections=[];
            var secMatch;
            while((secMatch=sectionRegex.exec(fullText))!==null){
              sections.push({letter:secMatch[1].toUpperCase(),pos:secMatch.index});
            }
            /* Also detect "Mandatory Criteria" as a pseudo-section */
            var mcPos=fullText.toLowerCase().indexOf('mandatory criteria');
            if(mcPos>=0)sections.unshift({letter:'MC',pos:mcPos});
            sections.sort(function(a,b){return a.pos-b.pos});

            /* Helper: get text for a section letter */
            var getSectionText=function(letter){
              if(sections.length===0)return fullText;
              for(var i=0;i<sections.length;i++){
                if(sections[i].letter===letter){
                  var start=sections[i].pos;
                  var end=i<sections.length-1?sections[i+1].pos:fullText.length;
                  return fullText.substring(start,end);
                }
              }
              return '';
            };

            /* Helper: map requirement section_id to section letter(s) */
            var mapSection=function(secId){
              if(!secId)return [''];
              var low=secId.toLowerCase();
              if(low.indexOf('mandatory')>=0)return ['MC'];
              var m=secId.match(/section\s+([a-f])\/([a-f])/i);
              if(m)return [m[1].toUpperCase(),m[2].toUpperCase()];
              var m2=secId.match(/section\s+([a-f])/i);
              if(m2)return [m2[1].toUpperCase()];
              return [''];
            };

            /* Helper: build search text from section letters */
            var buildSearchText=function(letters){
              if(!letters||letters.length===0||letters[0]==='')return fullText;
              var txt='';
              letters.forEach(function(l){
                var st=getSectionText(l);
                if(st)txt+=st+'\n';
              });
              return txt.length>20?txt:fullText;
            };

            /* Helper: extract keywords from a field name */
            var getKeywords=function(name){
              return name.toLowerCase().replace(/[^a-z0-9 ]/g,' ').split(/\s+/).filter(function(w){
                return w.length>2&&!stopWords.includes(w);
              });
            };

            /* Helper: find value between label match and next label boundary */
            var knownLabels=reqs.map(function(r){return r.field_name}).filter(function(n){return n.length>3});
            var extractValue=function(text,matchEnd){
              var remaining=text.substring(matchEnd,matchEnd+600).trim();
              /* Find the nearest next known label to use as boundary */
              var boundary=remaining.length;
              var remLower=remaining.toLowerCase();
              knownLabels.forEach(function(lbl){
                var kws=getKeywords(lbl);
                if(kws.length<2)return;
                var idx=remLower.indexOf(kws[0]);
                if(idx>0&&idx<boundary){
                  var chunk=remLower.substring(idx,idx+lbl.length+30);
                  var matched=kws.filter(function(k){return chunk.indexOf(k)>=0}).length;
                  if(matched>=Math.ceil(kws.length*0.6))boundary=idx;
                }
              });
              /* Also check for section headers as boundaries */
              var secBound=remaining.search(/Section\s+[A-F]\s*[:\-–]/i);
              if(secBound>0&&secBound<boundary)boundary=secBound;
              var raw=remaining.substring(0,boundary).trim();
              raw=raw.replace(/^[\s:–\-]+/,'').trim();
              /* Take meaningful content, skip empty lines */
              var lines=raw.split(/\n/).map(function(l){return l.trim()}).filter(function(l){return l.length>0});
              var val=lines.join(' ').trim();
              if(val.length>200)val=val.substring(0,200)+'...';
              if(placeholders.includes(val.toLowerCase()))return '';
              return val;
            };

            /* ── Assessment criteria keyword map ── */
            var acPatterns=[
              {match:'industry standard',field:'Assessment Criteria 1 (EN)'},
              {match:'today\'s workforce',field:'Assessment Criteria 1 (EN)'},
              {match:'students\' interests and/or needs',field:'Assessment Criteria 2'},
              {match:'student interest',field:'Assessment Criteria 2'},
              {match:'essential and technical skills',field:'Assessment Criteria 3 (EN)'},
              {match:'world of work',field:'Assessment Criteria 3 (EN)'},
              {match:'labour market',field:'Assessment Criteria 1 (SU)'},
              {match:'local context',field:'Assessment Criteria 3 (SU)'},
              {match:'sustainability',field:'Assessment Criteria 3 (SU)'},
              {match:'implemented during',field:'Assessment Criteria 4 (SU)'},
              {match:'current school year',field:'Assessment Criteria 4 (SU)'}
            ];

            /* ── Process each requirement ── */
            reqs.forEach(function(req){
              var prof=profs.find(function(p){return p.requirement_id===req.requirement_id})||{};
              if(prof.included_in_scan===false){
                findings.push(CCDM.createFinding({submission_file_id:sf.submission_file_id,file_name:sf.file_name,requirement_id:req.requirement_id,field_name:req.field_name,mandatory:req.mandatory,response_type:req.response_type,section_id:req.section_id,presence_classification:'Excluded',detection_method:'',confidence_contribution:0}));
                return;
              }
              var fileTemplate=sf.template_type||'Unknown';
              var reqScope=req.template_scope||'Both';
              if(reqScope!=='Both'&&fileTemplate!=='Unknown'&&reqScope!==fileTemplate){
                findings.push(CCDM.createFinding({submission_file_id:sf.submission_file_id,file_name:sf.file_name,requirement_id:req.requirement_id,field_name:req.field_name,mandatory:req.mandatory,response_type:req.response_type,section_id:req.section_id,presence_classification:'Not Applicable',detection_method:'Template Scope',confidence_contribution:0}));
                return;
              }

              /* Determine search scope */
              var secLetters=mapSection(req.section_id);
              var searchText=buildSearchText(secLetters);
              var searchLower=searchText.toLowerCase();
              var fieldName=req.field_name||'';
              var fieldLower=fieldName.toLowerCase();
              var keywords=getKeywords(fieldName);

              var bestScore=0;
              var bestMethod='';
              var extractedValue='';

              /* Strategy 1: Exact label in section text */
              var exactPos=searchLower.indexOf(fieldLower);
              if(exactPos>=0){
                bestScore=1;
                bestMethod='PDF Section: Exact Label';
                extractedValue=extractValue(searchText,exactPos+fieldName.length);
              }

              /* Strategy 2: Keyword overlap in section */
              if(bestScore<1&&keywords.length>0){
                var matched=keywords.filter(function(k){return searchLower.indexOf(k)>=0});
                var kwScore=matched.length/keywords.length;
                if(kwScore>bestScore&&kwScore>=0.5){
                  bestScore=kwScore;
                  bestMethod='PDF Section: Keyword ('+matched.length+'/'+keywords.length+')';
                  /* Find value near keyword cluster */
                  if(matched.length>0){
                    var positions=matched.map(function(k){return searchLower.indexOf(k)}).sort(function(a,b){return a-b});
                    var clusterEnd=positions[positions.length-1]+matched[matched.length-1].length;
                    extractedValue=extractValue(searchText,clusterEnd);
                  }
                }
              }

              /* Strategy 3: Assessment criteria special handling */
              if(bestScore<0.8&&fieldLower.indexOf('assessment criteria')>=0){
                for(var ai=0;ai<acPatterns.length;ai++){
                  var acp=acPatterns[ai];
                  if(fieldName.indexOf(acp.field)>=0||fieldLower.indexOf(acp.field.toLowerCase())>=0){
                    var acPos=searchLower.indexOf(acp.match);
                    if(acPos>=0){
                      bestScore=0.9;
                      bestMethod='PDF Section: Assessment Criteria Pattern';
                      /* Value is after "characters)" prompt ending */
                      var promptEnd=searchLower.indexOf('characters)',acPos);
                      if(promptEnd>=0){
                        extractedValue=extractValue(searchText,promptEnd+11);
                      } else {
                        extractedValue=extractValue(searchText,acPos+acp.match.length+100);
                      }
                      break;
                    }
                  }
                }
              }

              /* Strategy 4: Checkbox / mandatory criteria detection */
              if(bestScore<0.5&&(req.response_type==='checkbox'||req.data_type==='boolean')){
                var ckKeywords=fieldLower.replace(/mandatory criteria \d+\s*\([^)]*\):\s*/i,'').split(/\s+/).filter(function(w){return w.length>3&&!stopWords.includes(w)});
                if(ckKeywords.length>0){
                  var ckMatched=ckKeywords.filter(function(k){return searchLower.indexOf(k)>=0}).length;
                  if(ckMatched>=Math.ceil(ckKeywords.length*0.4)){
                    bestScore=0.8;
                    bestMethod='PDF Section: Checkbox Content ('+ckMatched+'/'+ckKeywords.length+' keywords)';
                    extractedValue='Checked (content present in document)';
                  }
                }
              }

              /* Strategy 5: Data type pattern matching */
              if(bestScore<0.5){
                var dt=req.data_type||'';
                var rt=req.response_type||'';
                if(dt==='email'||rt==='email'){
                  var emails=searchText.match(/[\w.\-]+@[\w.\-]+\.\w{2,}/g);
                  if(emails){
                    for(var ei=0;ei<emails.length;ei++){
                      var ePos=searchLower.indexOf(emails[ei].toLowerCase());
                      var nearbyBefore=searchLower.substring(Math.max(0,ePos-150),ePos);
                      var nearKw=keywords.filter(function(k){return nearbyBefore.indexOf(k)>=0}).length;
                      if(nearKw>0){bestScore=0.75;bestMethod='PDF Section: Email Pattern';extractedValue=emails[ei];break}
                    }
                  }
                } else if(dt==='currency'||rt==='currency'){
                  var currencies=searchText.match(/\$[\d,]+\.?\d*/g);
                  if(currencies){
                    for(var ci=0;ci<currencies.length;ci++){
                      var cPos=searchLower.indexOf(currencies[ci].toLowerCase());
                      var cBefore=searchLower.substring(Math.max(0,cPos-200),cPos);
                      var cKw=keywords.filter(function(k){return cBefore.indexOf(k)>=0}).length;
                      if(cKw>0){bestScore=0.75;bestMethod='PDF Section: Currency Pattern';extractedValue=currencies[ci];break}
                    }
                  }
                } else if(dt==='phone'||rt==='phone'){
                  var phones=searchText.match(/\d{3}[\s.\-]\d{3}[\s.\-]\d{4}/g);
                  if(phones){
                    for(var pi=0;pi<phones.length;pi++){
                      var pPos=searchLower.indexOf(phones[pi]);
                      var pBefore=searchLower.substring(Math.max(0,pPos-150),pPos);
                      var pKw=keywords.filter(function(k){return pBefore.indexOf(k)>=0}).length;
                      if(pKw>0){bestScore=0.75;bestMethod='PDF Section: Phone Pattern';extractedValue=phones[pi];break}
                    }
                  }
                } else if(dt==='date'||rt==='date'){
                  var dates=searchText.match(/(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*[\s,]+\d{1,2}[\s,]+\d{4}|\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}/gi);
                  if(dates){
                    for(var di=0;di<dates.length;di++){
                      var dPos=searchLower.indexOf(dates[di].toLowerCase());
                      var dBefore=searchLower.substring(Math.max(0,dPos-150),dPos);
                      var dKw=keywords.filter(function(k){return dBefore.indexOf(k)>=0}).length;
                      if(dKw>0){bestScore=0.75;bestMethod='PDF Section: Date Pattern';extractedValue=dates[di];break}
                    }
                  }
                }
              }

              /* Strategy 6: Fuzzy sliding window (last resort) */
              if(bestScore<0.5){
                var textWords=searchText.split(/\s+/);
                var winSize=Math.min(fieldName.split(' ').length+2,10);
                for(var wi=0;wi<textWords.length-winSize+1&&bestScore<0.6;wi++){
                  var chunk=textWords.slice(wi,wi+winSize).join(' ');
                  var sim=CE.similarity(fieldName,chunk);
                  if(sim>bestScore&&sim>=0.45){
                    bestScore=sim;
                    bestMethod='PDF Section: Fuzzy ('+Math.round(sim*100)+'%)';
                    extractedValue=extractValue(searchText,searchText.indexOf(chunk)+chunk.length);
                  }
                }
              }

              /* ── Classify ── */
              var presence='Absent';
              var notes='';
              if(bestScore>=0.7&&extractedValue){
                presence='Present';
                notes=bestMethod+': field found with value';
              } else if(bestScore>=0.7&&!extractedValue){
                presence='Partial';
                notes=bestMethod+': label/pattern found but no substantive value detected';
              } else if(bestScore>=0.5&&extractedValue){
                presence='Present';
                notes=bestMethod+': matched with extracted value';
              } else if(bestScore>=0.5){
                presence='Partial';
                notes=bestMethod+': weak match, no value extracted';
              } else {
                presence='Absent';
                notes='No matching label, keywords, or data patterns found in document';
              }

              findings.push(CCDM.createFinding({submission_file_id:sf.submission_file_id,file_name:sf.file_name,requirement_id:req.requirement_id,field_name:req.field_name,mandatory:req.mandatory,response_type:req.response_type,section_id:req.section_id,presence_classification:presence,detection_method:bestMethod||'None',confidence_contribution:Math.round(bestScore*100),complexity_flag:prof.complexity_flag||'',reviewer_notes:notes,extracted_value:extractedValue}));
            });

            SM.ccdm.entities.findings=SM.ccdm.entities.findings.concat(findings);
            var ca=CE.calculateCompleteness(SM.ccdm,sf.submission_file_id);
            ca.file_name=sf.file_name;
            SM.ccdm.entities.confidence_assessments.push(ca);
            sf.processing_status='Scanned';sf.sheet_count=pdf.numPages;sf.scan_timestamp=new Date().toISOString();
            totalFindings+=findings.length;
            pending--;if(pending===0)app._finishScan();
          });
        }).catch(function(err){
          sf.processing_status='Error: '+err.message;sf.scan_timestamp=new Date().toISOString();
          pending--;if(pending===0)app._finishScan();
        });
      };
      reader.readAsArrayBuffer(file);
    } else {
      /* DOC, DOCX, or unreadable PDF: Indeterminate classification */
      var reqs=SM.ccdm.requirements_baseline.requirements;
      var profs=SM.ccdm.requirements_baseline.field_profile;
      var indetFindings=reqs.map(function(req){
        var prof=profs.find(function(p){return p.requirement_id===req.requirement_id})||{};
        if(prof.included_in_scan===false){
          return CCDM.createFinding({submission_file_id:sf.submission_file_id,file_name:sf.file_name,requirement_id:req.requirement_id,field_name:req.field_name,mandatory:req.mandatory,response_type:req.response_type,section_id:req.section_id,presence_classification:'Excluded',detection_method:'',confidence_contribution:0,complexity_flag:prof.complexity_flag||''});
        }
        return CCDM.createFinding({submission_file_id:sf.submission_file_id,file_name:sf.file_name,requirement_id:req.requirement_id,field_name:req.field_name,mandatory:req.mandatory,response_type:req.response_type,section_id:req.section_id,presence_classification:'Indeterminate',detection_method:'Indeterminate',confidence_contribution:0,complexity_flag:prof.complexity_flag||'',reviewer_notes:'Format not supported for automated extraction ('+sf.file_type+'). Manual classification required.'});
      });
      SM.ccdm.entities.findings=SM.ccdm.entities.findings.concat(indetFindings);
      var ca=CE.calculateCompleteness(SM.ccdm,sf.submission_file_id);
      ca.file_name=sf.file_name;
      SM.ccdm.entities.confidence_assessments.push(ca);
      sf.processing_status='OK (Manual Review Required)';sf.sheet_count=0;sf.scan_timestamp=new Date().toISOString();
      totalFindings+=indetFindings.length;
      pending--;if(pending===0)app._finishScan();
    }
    });
  },
  _finishScan:function(){
    SM.update(function(c){c.workbook_metadata.status='Scanned'},'Scan complete');
    VM.snapshot(SM.ccdm,'Scanned','Pass');
    SM.ses.scanStats={files:SM.ccdm.entities.submission_files.length,reqs:SM.ccdm.requirements_baseline.requirements.length,findings:SM.ccdm.entities.findings.length};
    SM.transition('p2_summary');SM.persist();app.render();
  },
  setScanFilter:function(val){SM.ses._scanFilter=val;SM.persist();app.render()},
  setScanSearch:function(val){SM.ses._scanSearch=val;SM.persist();app.render()},
    sortScan:function(col){
    if(SM.ses._scanSortCol===col){SM.ses._scanSortDir=SM.ses._scanSortDir==='asc'?'desc':'asc'}
    else{SM.ses._scanSortCol=col;SM.ses._scanSortDir='asc'}
    SM.persist();app.render();
  },
  goToPart3:function(){SM.transition('p3');app.render()},
  /* Part 3 */
  switchTab:function(t){SM.ses.activeTab=t;SM.persist();app.render()},
  editCell:function(td){
    var field=td.dataset.field;var tabId=td.dataset.tab;var ri=parseInt(td.dataset.row);
    var val=td.textContent.trim();
    var rows=getTabData(SM.ccdm,tabId);
    if(!rows[ri])return;
    /* Find the actual entity and update it */
    if(tabId==='tab_fd'){
      var finding=SM.ccdm.entities.findings[ri];
      if(finding){
        if(field==='presence_classification'&&!EN.presence.includes(val)){alert('Invalid. Use: '+EN.presence.join(', '));app.render();return}
        if(field==='presence_classification')finding.detection_method='Manual Override';
        finding[field]=val;
      }
    } else if(tabId==='tab_cs'||tabId==='tab_cr'){
      var ca=SM.ccdm.entities.confidence_assessments[ri];
      if(ca)ca[field]=val;
    }
    SM.audit('user','Edited '+field+' in '+tabId);SM.persist();
  },
  runValidation:function(){
    SM.ses.valResults=VE.runAll(SM.ccdm);
    SM.ses.activeTab='tab_vr';
    SM.audit('user','Validation: '+SM.ses.valResults.length+' findings');
    SM.persist();app.render();
  },
  approve:function(){
    var results=VE.runAll(SM.ccdm);SM.ses.valResults=results;
    if(VE.hasBlocking(results)){
      alert('Cannot approve: '+VE.countBy(results).blocking+' blocking error(s).');
      SM.ses.activeTab='tab_vr';SM.persist();app.render();return;
    }
    if(!confirm('Approve workbook? This creates an immutable snapshot and locks editing.'))return;
    SM.update(function(c){c.workbook_metadata.status='Approved'},'Workbook approved');
    VM.snapshot(SM.ccdm,'Approved','Pass');
    SM.ses.isApproved=true;SM.persist();app.render();
  },
  toggleExport:function(){var m=document.getElementById('exmenu');m.classList.toggle('sh')},
  doExport:function(fmt){
    document.getElementById('exmenu').classList.remove('sh');
    if(!EE.canExport(SM.ses.valResults||[]))return;
    if(fmt==='json')EE.exportJSON(SM.ccdm);
    else if(fmt==='excel')EE.exportExcel(SM.ccdm);
    else if(fmt==='pdf')EE.exportPDF();
    else if(fmt==='word')EE.exportWord(SM.ccdm);
    SM.audit('user','Exported as '+fmt);SM.persist();
  },
  showImportModal:function(){document.getElementById('importInput').click()},
  handleImport:function(e){
    var file=e.target.files[0];if(!file)return;
    var ext=file.name.split('.').pop().toLowerCase();
    if(ext==='json'){
      var reader=new FileReader();
      reader.onload=function(ev){
        try{
          var data=JSON.parse(ev.target.result);
          var errs=VE.v14(data);
          if(errs.some(function(e){return e.severity==='blocking'})){
            app._repairIssues=errs.map(function(e){return {field:e.entity,message:e.message}});
            app.showModal(renderRepair(app._repairIssues));return;
          }
          SM.update(function(c){
            if(data.entities)c.entities=data.entities;
            if(data.requirements_baseline)c.requirements_baseline=data.requirements_baseline;
            if(data.scan_configuration)c.scan_configuration=data.scan_configuration;
            if(data.schema)c.schema=data.schema;
            c.workbook_metadata.status='Scanned';
          },'Imported CCDM from JSON');
          VM.snapshot(SM.ccdm,'Imported','Pass');
          SM.ses.isApproved=false;SM.persist();
          alert('JSON import successful.');app.render();
        }catch(ex){alert('JSON parse error: '+ex.message)}
      };
      reader.readAsText(file);
    } else if(ext==='xlsx'){
      var reader=new FileReader();
      reader.onload=function(ev){
        try{
          var wb=XLSX.read(ev.target.result,{type:'array'});
          /* Reconstruct findings from Field Detail sheet */
          var fdSheet=wb.Sheets['Field Detail'];
          if(fdSheet){
            var rows=XLSX.utils.sheet_to_json(fdSheet,{defval:''});
            var findings=rows.map(function(r){
              return CCDM.createFinding({finding_id:r['Finding ID']||CCDM.uid('f'),submission_file_id:r['File ID']||'',file_name:r['File Name']||'',requirement_id:r['Req ID']||'',field_name:r['Field Name']||'',mandatory:String(r['Mandatory']).toLowerCase()==='yes',response_type:r['Response Type']||'',section_id:r['Section']||'',presence_classification:r['Presence']||'Absent',detection_method:r['Detection']||'',confidence_contribution:Number(r['Confidence'])||0,complexity_flag:r['Complexity']||'',reviewer_notes:r['Notes']||''});
            });
            SM.update(function(c){c.entities.findings=findings},'Excel import: Field Detail');
          }
          VM.snapshot(SM.ccdm,'Imported','Warn');
          SM.ses.isApproved=false;SM.persist();
          alert('Excel import successful (inferential reconstruction).');app.render();
        }catch(ex){alert('Excel import error: '+ex.message)}
      };
      reader.readAsArrayBuffer(file);
    } else {alert('Use JSON or XLSX.')}
    e.target.value='';
  },
  showReportBuilder:function(){app.showModal(renderReportBuilder())},
  generateReport:function(){
    var selTabs=[];document.querySelectorAll('.rpt-tab:checked').forEach(function(cb){selTabs.push(cb.value)});
    if(selTabs.length===0){alert('Select at least one tab.');return}
    var confSel=Array.from(document.getElementById('rptConf').selectedOptions).map(function(o){return o.value});
    var presSel=Array.from(document.getElementById('rptPres').selectedOptions).map(function(o){return o.value});
    var mandFilter=document.getElementById('rptMand').value;
    var fmt=document.getElementById('rptFmt').value;
    /* Filter data */
    var c=SM.ccdm;
    var filteredFindings=c.entities.findings.filter(function(f){
      if(mandFilter==='yes'&&!f.mandatory)return false;
      if(mandFilter==='no'&&f.mandatory)return false;
      if(!presSel.includes(f.presence_classification))return false;
      return true;
    });
    var filteredCA=c.entities.confidence_assessments.filter(function(a){return confSel.includes(a.confidence_level)});
    if(fmt==='json'){
      var payload={tabs:selTabs,filters:{confidence:confSel,presence:presSel,mandatory:mandFilter},completeness_summary:selTabs.includes('tab_cs')?filteredCA:[],field_detail:selTabs.includes('tab_fd')?filteredFindings:[],confidence_report:selTabs.includes('tab_cr')?filteredCA:[],submission_inventory:selTabs.includes('tab_si')?c.entities.submission_files:[],requirements_baseline:selTabs.includes('tab_rb')?c.requirements_baseline.requirements:[]};
      EE.dl(new Blob([JSON.stringify(payload,null,2)],{type:'application/json'}),'Report_'+Date.now()+'.json');
    } else if(fmt==='excel'){
      var wb=XLSX.utils.book_new();
      if(selTabs.includes('tab_cs')){
        var d=filteredCA.map(function(a){return [a.file_name,a.confidence_level,a.confidence_score,a.mand_present,a.mand_absent,a.rationale]});
        XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['File','Confidence','Score','Mand Present','Mand Absent','Rationale']].concat(d)),'Completeness Summary');
      }
      if(selTabs.includes('tab_fd')){
        var d2=filteredFindings.map(function(f){return [f.file_name,f.field_name,f.mandatory?'Yes':'No',f.presence_classification,f.detection_method,f.confidence_contribution,f.reviewer_notes]});
        XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['File','Field','Mandatory','Presence','Detection','Confidence','Notes']].concat(d2)),'Field Detail');
      }
      XLSX.writeFile(wb,'Report_'+Date.now()+'.xlsx');
    } else if(fmt==='word'){
      var h="<html><head><meta charset='UTF-8'><style>body{font-family:Segoe UI,sans-serif;font-size:11pt}h1{color:#0070C0}h2{color:#004578}table{border-collapse:collapse;width:100%;margin-bottom:20px}th{background:#004578;color:#fff;padding:6px 8px}td{border:1px solid #d1d5db;padding:5px 8px}</style></head><body><h1>Completeness Report</h1>";
      if(selTabs.includes('tab_cs')){
        h+="<h2>Completeness Summary</h2><table><tr><th>File</th><th>Confidence</th><th>Score</th><th>Rationale</th></tr>";
        filteredCA.forEach(function(a){h+="<tr><td>"+a.file_name+"</td><td>"+a.confidence_level+"</td><td>"+a.confidence_score+"%</td><td>"+a.rationale+"</td></tr>"});
        h+="</table>";
      }
      if(selTabs.includes('tab_fd')){
        h+="<h2>Field Detail</h2><table><tr><th>File</th><th>Field</th><th>Presence</th><th>Detection</th><th>Notes</th></tr>";
        filteredFindings.forEach(function(f){h+="<tr><td>"+f.file_name+"</td><td>"+f.field_name+"</td><td>"+f.presence_classification+"</td><td>"+f.detection_method+"</td><td>"+f.reviewer_notes+"</td></tr>"});
        h+="</table>";
      }
      h+="<div style='text-align:center;font-size:9pt;color:#666;margin-top:30px'>Classification: Protected A</div></body></html>";
      EE.dl(new Blob([h],{type:'application/msword'}),'Report_'+Date.now()+'.doc');
    }
    app.hideModal();
    SM.audit('user','Generated report: '+fmt);SM.persist();
  },
  showVersions:function(){app.showModal(renderVersions(SM.ccdm))},
  doRollback:function(vid){
    if(!confirm('Rollback to '+vid+'? This creates a new version (non-destructive).'))return;
    VM.rollback(SM.ccdm,vid);
    SM.ses.isApproved=(SM.ccdm.workbook_metadata.status==='Approved');
    SM.audit('user','Rolled back to '+vid);SM.persist();app.hideModal();app.render();
  },
/* Grid controls */
  setSearch:function(tabId,val){
    if(!SM.ses.gridSearch)SM.ses.gridSearch={};
    SM.ses.gridSearch[tabId]=val;
    SM.persist();app.render();
  },
  toggleSort:function(tabId,field){
    if(!SM.ses.gridSortCol)SM.ses.gridSortCol={};
    if(!SM.ses.gridSortAsc)SM.ses.gridSortAsc={};
    if(SM.ses.gridSortCol[tabId]===field){SM.ses.gridSortAsc[tabId]=!SM.ses.gridSortAsc[tabId]}
    else{SM.ses.gridSortCol[tabId]=field;SM.ses.gridSortAsc[tabId]=true}
    SM.persist();app.render();
  },
  toggleFileSelect:function(sfId,checked){
    if(!SM.ses.selectedFileIds)SM.ses.selectedFileIds=[];
    if(checked){if(!SM.ses.selectedFileIds.includes(sfId))SM.ses.selectedFileIds.push(sfId)}
    else{SM.ses.selectedFileIds=SM.ses.selectedFileIds.filter(function(id){return id!==sfId})}
    SM.persist();app.render();
  },
  selectAllRows:function(tabId,checked){
    if(tabId==='tab_si'){
      if(checked){SM.ses.selectedFileIds=SM.ccdm.entities.submission_files.map(function(f){return f.submission_file_id})}
      else{SM.ses.selectedFileIds=[]}
    }
    if(tabId==='tab_fd'){
      if(!SM.ses._fdSelected)SM.ses._fdSelected=[];
      if(checked){
        var rows=filterBySelection(SM.ccdm.entities.findings,SM.ses,'submission_file_id');
        SM.ses._fdSelected=rows.map(function(f){return f.finding_id});
      } else {SM.ses._fdSelected=[]}
    }
    SM.persist();app.render();
  },
  toggleFdSelect:function(fid,checked){
    if(!SM.ses._fdSelected)SM.ses._fdSelected=[];
    if(checked){if(!SM.ses._fdSelected.includes(fid))SM.ses._fdSelected.push(fid)}
    else{SM.ses._fdSelected=SM.ses._fdSelected.filter(function(id){return id!==fid})}
    SM.persist();app.render();
  },
  bulkClassify:function(){
    var sel=document.getElementById('bulkPresence');
    var val=sel.value;
    if(!val){alert('Select a classification first.');return}
    if(!SM.ses._fdSelected||SM.ses._fdSelected.length===0){alert('Select one or more findings first.');return}
    var notes=prompt('Reviewer notes (required for Manual Override per V2-017):');
    if(notes===null)return;
    if(!notes.trim()){alert('Notes are required for bulk classification.');return}
    var count=0;
    SM.update(function(c){
      c.entities.findings.forEach(function(f){
        if(SM.ses._fdSelected.includes(f.finding_id)){
          f.presence_classification=val;
          f.detection_method='Manual Override';
          f.reviewer_notes=notes;
          count++;
        }
      });
      /* Recalculate confidence for affected files */
      var affectedFiles=new Set();
      c.entities.findings.forEach(function(f){if(SM.ses._fdSelected.includes(f.finding_id))affectedFiles.add(f.submission_file_id)});
      affectedFiles.forEach(function(sfId){
        var idx=c.entities.confidence_assessments.findIndex(function(a){return a.submission_file_id===sfId});
        var ca=CE.calculateCompleteness(c,sfId);
        var sf=c.entities.submission_files.find(function(f){return f.submission_file_id===sfId});
        if(sf)ca.file_name=sf.file_name;
        if(idx>=0)c.entities.confidence_assessments[idx]=ca;
        else c.entities.confidence_assessments.push(ca);
      });
    },'Bulk classified '+count+' findings as '+val);
    SM.ses._fdSelected=[];
    SM.persist();app.render();
  },
  commitRepair:function(){SM.audit('user','Repair mode acknowledged');SM.persist();app.hideModal();app.render()},
  globalReset:function(){
    if(!confirm('GLOBAL RESET\n\nThis permanently removes ALL data, versions, and audit history.\n\nProceed?'))return;
    if(!confirm('Are you absolutely sure?'))return;
    SM.reset();app.render();
  }
};
app.init();
document.addEventListener('click',function(e){if(!e.target.closest('.em')){var m=document.getElementById('exmenu');if(m)m.classList.remove('sh')}});
</script>
