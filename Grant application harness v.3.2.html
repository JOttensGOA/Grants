<!DOCTYPE html>
<html lang="en">
<head>

<style>

body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,Arial,sans-serif;font-size:14px;color:#1a1a1a;background:#f5f5f5}
.hdr{background:var(--bd);color:var(--w);padding:12px 24px;font-size:16px;font-weight:600}
.ftr{background:var(--bd);color:var(--w);padding:8px;text-align:center;font-size:11px;position:fixed;bottom:0;width:100%;z-index:50}
#app{max-width:1400px;margin:0 auto;padding:20px 24px 60px}
h1{color:var(--bd);font-size:22px;margin-bottom:12px}
h2{color:var(--bd);font-size:18px;margin:16px 0 8px}
h3{color:var(--b);font-size:15px;margin:12px 0 6px}
p,li{line-height:1.6;color:#4B5563;margin-bottom:6px}
ul{padding-left:20px}
.card{background:var(--w);border:1px solid var(--gb);border-radius:8px;padding:20px;margin-bottom:16px}
.btn{padding:8px 16px;border:none;border-radius:4px;cursor:pointer;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-p{background:var(--b);color:var(--w)}.btn-p:hover:not(:disabled){background:var(--bd)}
.btn-s{background:var(--gl);color:#333;border:1px solid var(--gb)}
.btn-g{background:var(--g);color:var(--w)}.btn-r{background:var(--r);color:var(--w)}
.btn-sm{padding:4px 10px;font-size:12px}
.tbar{display:flex;gap:8px;flex-wrap:wrap;padding:10px 0;border-bottom:2px solid var(--b);margin-bottom:12px;align-items:center}

.tabs{display:flex;gap:2px;border-bottom:2px solid var(--gb);margin-bottom:12px;flex-wrap:wrap}

.bH{background:#dcfce7;color:#166534}.bM{background:#fef3c7;color:#92400e}.bL{background:#fee2e2;color:#991b1b}
.bPr{background:#dcfce7;color:#166534}.bAb{background:#fee2e2;color:#991b1b}.bPa{background:#fef3c7;color:#92400e}
.bEx{background:#e5e7eb;color:#6b7280}.bIn{background:#dbeafe;color:#1e40af}

.cg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0}
.ci{display:flex;flex-direction:column;gap:4px}

.ci input,.ci select{padding:6px 10px;border:1px solid var(--gb);border-radius:4px}
.pb{width:100%;height:20px;background:var(--gl);border-radius:10px;overflow:hidden;margin:8px 0}
.pf{height:100%;background:var(--b);transition:width .3s;border-radius:10px}
.lb{padding:10px 16px;border-radius:6px;font-weight:600;margin:12px 0;display:flex;align-items:center;gap:8px}

<body>
<div class="hdr">Government of Alberta - Grant Submission Completeness Review - Stage 2</div>
<div id="app"></div>
<div class="mo" id="mo"><div class="md" id="mc"></div></div>
<div class="ftr">Classification: Protected A</div>
<script>
'use strict';

/* ================================================================
   ENUMS
   ================================================================ */
var EN={
  status:['Draft','Locked','Scanned','Approved'],
  presence:['Present','Absent','Partial','Excluded','Indeterminate','Not Applicable'],
  confidence:['H','M','L'],
  detection:['Exact Label','Fuzzy Label','Structural Position','Response Type','Table Header','Manual Override'],
  fileType:['CSV','XLS','XLSX','PDF','DOC','DOCX'],
  severity:['blocking','warning','informational'],
  origin:['Created','Edited','Imported','Merged','Rolled-Back','Scanned','Locked','Approved']
};

/* ================================================================
   CCDM - Canonical Completeness Data Model (Section 8)
   ================================================================ */
var CCDM={
_counters:{},
uid:function(p){
  if(!CCDM._counters[p])CCDM._counters[p]=0;
  CCDM._counters[p]++;
  var labels={wb:'WB',v:'VER',req:'REQ',sf:'SF',f:'F',e:'EVT',err:'ERR'};
  return (labels[p]||p.toUpperCase())+'-'+CCDM._counters[p];
},
syncCounters:function(c){
  var extract=function(arr,field,prefix){
    arr.forEach(function(item){
      var val=item[field]||'';
      var match=val.match(new RegExp(prefix+'-(\\d+)'));
      if(match){var n=parseInt(match[1]);var key=prefix.toLowerCase();if(!CCDM._counters[key]||n>CCDM._counters[key])CCDM._counters[key]=n}
    });
  };
  if(c.requirements_baseline)extract(c.requirements_baseline.requirements,'requirement_id','REQ');
  if(c.entities){
    extract(c.entities.submission_files,'submission_file_id','SF');
    extract(c.entities.findings,'finding_id','F');
  }
  if(c.version_history)extract(c.version_history.version_graph,'version_id','VER');
},
remapRequirementIds:function(c){
  var map={};
  CCDM._counters.req=0;
  c.requirements_baseline.requirements.forEach(function(r){
    var oldId=r.requirement_id;
    var newId=CCDM.uid('req');
    map[oldId]=newId;
    r.requirement_id=newId;
  });
  c.requirements_baseline.field_profile.forEach(function(p){
    if(map[p.requirement_id])p.requirement_id=map[p.requirement_id];
  });
  c.entities.findings.forEach(function(f){
    if(map[f.requirement_id])f.requirement_id=map[f.requirement_id];
  });
  c.relationships.req_to_finding.forEach(function(r){
    if(map[r.requirement_id])r.requirement_id=map[r.requirement_id];
  });
},
  createEmpty:function(){
    var now=new Date().toISOString();
    return {
      workbook_metadata:{workbook_id:CCDM.uid('wb'),version_id:CCDM.uid('v'),purpose:'Stage 2 Completeness Review',stage1_source:null,created_timestamp:now,last_updated_timestamp:now,status:'Draft'},
      requirements_baseline:{source_import:{file_name:'',format:'',version_id:null,import_timestamp:null},requirements:[],field_profile:[]},
      scan_configuration:{threshold_high:90,threshold_medium:60,optional_threshold:75,include_optional:false,flag_partial:true},
      entities:{submission_files:[],findings:[],confidence_assessments:[]},
      schema:{column_definitions:CCDM.defaultColumns(),data_dictionary:{fields:[],source_files:[],generated_timestamp:now}},
      relationships:{req_to_finding:[],sub_to_finding:[],stage1_trace:[]},
      views:{tabs:CCDM.defaultTabs()},
      version_history:{version_graph:[],audit_log:[]}
    };
  },
  defaultTabs:function(){return [
    {tab_id:'tab_cs',tab_name:'Completeness Summary',editable_fields:['user_notes']},
    {tab_id:'tab_fd',tab_name:'Field Detail',editable_fields:['presence_classification','reviewer_notes','complexity_flag']},
    {tab_id:'tab_cr',tab_name:'Confidence Report',editable_fields:['override_level','override_rationale']},
    {tab_id:'tab_si',tab_name:'Submission Inventory',editable_fields:[]},
    {tab_id:'tab_rb',tab_name:'Requirements Baseline',editable_fields:[]},
    {tab_id:'tab_dd',tab_name:'Data Dictionary',editable_fields:[]},
    {tab_id:'tab_vr',tab_name:'Validation Report',editable_fields:[]}
  ]},
  defaultColumns:function(){return [
    {id:'cs_fid',name:'File ID',tab:'tab_cs',field:'submission_file_id',sys:true},
    {id:'cs_fn',name:'File Name',tab:'tab_cs',field:'file_name',sys:true},
    {id:'cs_cl',name:'Confidence',tab:'tab_cs',field:'confidence_level',sys:true},
    {id:'cs_sc',name:'Score',tab:'tab_cs',field:'confidence_score',sys:true},
    {id:'cs_mp',name:'Mand. Present',tab:'tab_cs',field:'mand_present',sys:true},
    {id:'cs_ma',name:'Mand. Absent',tab:'tab_cs',field:'mand_absent',sys:true},
    {id:'cs_mpa',name:'Mand. Partial',tab:'tab_cs',field:'mand_partial',sys:true},
    {id:'cs_op',name:'Opt. Present',tab:'tab_cs',field:'opt_present',sys:true},
    {id:'cs_oa',name:'Opt. Absent',tab:'tab_cs',field:'opt_absent',sys:true},
    {id:'cs_ind',name:'Indeterminate',tab:'tab_cs',field:'indeterminate_count',sys:true},
    {id:'cs_rat',name:'Rationale',tab:'tab_cs',field:'rationale',sys:true},
    {id:'cs_notes',name:'User Notes',tab:'tab_cs',field:'user_notes',sys:false},
    {id:'fd_fid',name:'Finding ID',tab:'tab_fd',field:'finding_id',sys:true},
    {id:'fd_sfid',name:'File ID',tab:'tab_fd',field:'submission_file_id',sys:true},
    {id:'fd_fn',name:'File Name',tab:'tab_fd',field:'file_name',sys:true},
    {id:'fd_rid',name:'Requirement ID',tab:'tab_fd',field:'requirement_id',sys:true},
    {id:'fd_fname',name:'Field Name',tab:'tab_fd',field:'field_name',sys:true},
    {id:'fd_mand',name:'Mandatory',tab:'tab_fd',field:'mandatory',sys:true},
    {id:'fd_rtype',name:'Response Type',tab:'tab_fd',field:'response_type',sys:true},
    {id:'fd_sec',name:'Section',tab:'tab_fd',field:'section_id',sys:true},
    {id:'fd_pres',name:'Presence',tab:'tab_fd',field:'presence_classification',sys:false},
    {id:'fd_det',name:'Detection',tab:'tab_fd',field:'detection_method',sys:true},
    {id:'fd_conf',name:'Confidence',tab:'tab_fd',field:'confidence_contribution',sys:true},
    {id:'fd_cflag',name:'Complexity',tab:'tab_fd',field:'complexity_flag',sys:false},
    {id:'fd_notes',name:'Reviewer Notes',tab:'tab_fd',field:'reviewer_notes',sys:false},
    {id:'fd_val',name:'Extracted Value',tab:'tab_fd',field:'extracted_value',sys:true},
    {id:'cr_fid',name:'File ID',tab:'tab_cr',field:'submission_file_id',sys:true},
    {id:'cr_fn',name:'File Name',tab:'tab_cr',field:'file_name',sys:true},
    {id:'cr_cl',name:'Confidence',tab:'tab_cr',field:'confidence_level',sys:true},
    {id:'cr_sc',name:'Score',tab:'tab_cr',field:'confidence_score',sys:true},
    {id:'cr_rat',name:'Rationale',tab:'tab_cr',field:'rationale',sys:true},
    {id:'cr_abs',name:'Key Absent',tab:'tab_cr',field:'key_absent',sys:true},
    {id:'cr_par',name:'Key Partial',tab:'tab_cr',field:'key_partial',sys:true},
    {id:'cr_ind',name:'Indeterminate',tab:'tab_cr',field:'indeterminate_fields',sys:true},
    {id:'cr_ol',name:'Override Level',tab:'tab_cr',field:'override_level',sys:false},
    {id:'cr_or',name:'Override Rationale',tab:'tab_cr',field:'override_rationale',sys:false},
    {id:'si_fid',name:'File ID',tab:'tab_si',field:'submission_file_id',sys:true},
    {id:'si_fn',name:'File Name',tab:'tab_si',field:'file_name',sys:true},
    {id:'si_ft',name:'Type',tab:'tab_si',field:'file_type',sys:true},
    {id:'si_sc',name:'Sheets',tab:'tab_si',field:'sheet_count',sys:true},
    {id:'si_st',name:'Status',tab:'tab_si',field:'processing_status',sys:true},
    {id:'si_ts',name:'Scanned',tab:'tab_si',field:'scan_timestamp',sys:true},
    {id:'si_tpl',name:'Template',tab:'tab_si',field:'template_type',sys:true},
    {id:'rb_rid',name:'Requirement ID',tab:'tab_rb',field:'requirement_id',sys:true},
    {id:'rb_fn',name:'Field Name',tab:'tab_rb',field:'field_name',sys:true},
    {id:'rb_m',name:'Mandatory',tab:'tab_rb',field:'mandatory',sys:true},
    {id:'rb_rt',name:'Response Type',tab:'tab_rb',field:'response_type',sys:true},
    {id:'rb_dt',name:'Data Type',tab:'tab_rb',field:'data_type',sys:true},
    {id:'rb_sec',name:'Section',tab:'tab_rb',field:'section_id',sys:true},
    {id:'rb_ft',name:'Field Type',tab:'tab_rb',field:'field_type',sys:true},
    {id:'rb_inc',name:'Included',tab:'tab_rb',field:'included_in_scan',sys:true},
    {id:'rb_cf',name:'Complexity',tab:'tab_rb',field:'complexity_flag',sys:true}
  ]},
  createReq:function(o){return Object.assign({requirement_id:CCDM.uid('req'),field_name:'',mandatory:true,response_type:'free-text',data_type:'string',field_type:'text',section_id:'',template_scope:'Both',evidence_requirements:'',reviewer_guidance:''},o||{})},
  createFieldProfile:function(o){return Object.assign({requirement_id:'',included_in_scan:true,complexity_flag:''},o||{})},
  createSubFile:function(o){return Object.assign({submission_file_id:CCDM.uid('sf'),file_name:'',file_type:'',template_type:'Unknown',sheet_count:0,processing_status:'Pending',scan_timestamp:null,sort_order:0},o||{})},
  createFinding:function(o){return Object.assign({finding_id:CCDM.uid('f'),submission_file_id:'',file_name:'',requirement_id:'',field_name:'',mandatory:false,response_type:'',section_id:'',presence_classification:'Absent',detection_method:'',confidence_contribution:0,complexity_flag:'',reviewer_notes:'',extracted_value:''},o||{})},
  createConfAssessment:function(o){return Object.assign({submission_file_id:'',file_name:'',completeness_status:'Incomplete',completeness_pct:0,mand_total:0,mand_present:0,mand_absent:0,mand_partial:0,opt_total:0,opt_present:0,opt_absent:0,opt_pct:0,indeterminate_count:0,rationale:'',gap_mandatory:'',gap_optional:'',indeterminate_fields:'',user_notes:''},o||{})}
};

/* ================================================================
   STATE MANAGER
   ================================================================ */
var SM={
  ccdm:null,
  ses:null,
  _fileStore:{},
  init:function(){
    SM.ccdm=CCDM.createEmpty();
    SM.ses={phase:'p1_purpose',s1Files:[],subFiles:[],activeTab:'tab_cs',selRow:null,valResults:[],isApproved:false,isLocked:false,sortMode:'upload',scanStats:null,selectedFileIds:[],gridSearch:{},gridSortCol:{},gridSortAsc:{}};
    SM.persist();
  },
  persist:function(){try{localStorage.setItem('goa_s2_c',JSON.stringify(SM.ccdm));localStorage.setItem('goa_s2_s',JSON.stringify(SM.ses))}catch(e){}},
  load:function(){try{var c=localStorage.getItem('goa_s2_c'),s=localStorage.getItem('goa_s2_s');if(c&&s){SM.ccdm=JSON.parse(c);CCDM.syncCounters(SM.ccdm);SM.ses=JSON.parse(s);if(!SM.ses._baselineFilter)SM.ses._baselineFilter='All';if(!SM.ses._baselineSortCol)SM.ses._baselineSortCol='template';if(!SM.ses._baselineSortDir)SM.ses._baselineSortDir='asc';if(!SM.ses.gridSearch)SM.ses.gridSearch={};if(!SM.ses.gridSortCol)SM.ses.gridSortCol={};if(!SM.ses.gridSortAsc)SM.ses.gridSortAsc={};if(!SM.ses.selectedFileIds)SM.ses.selectedFileIds=[];if(SM.ses.phase==='p1_profile')SM.ses.phase='p1_config';if(!SM.ccdm.scan_configuration.optional_threshold)SM.ccdm.scan_configuration.optional_threshold=75;if(!SM.ses._scanSortCol)SM.ses._scanSortCol='name';if(!SM.ses._scanSortDir)SM.ses._scanSortDir='asc';return true}}catch(e){}return false},
  update:function(fn,desc){
    if(SM.ses.isApproved&&desc!=='force')return false;
    fn(SM.ccdm);
    SM.ccdm.workbook_metadata.last_updated_timestamp=new Date().toISOString();
    SM.audit('user',desc||'update');
    SM.persist();return true;
  },
  transition:function(p){SM.ses.phase=p;SM.audit('system','Phase: '+p);SM.persist()},
  audit:function(actor,action){SM.ccdm.version_history.audit_log.push({event_id:CCDM.uid('e'),timestamp:new Date().toISOString(),actor:actor,action:action})},
  reset:function(){SM._fileStore={};localStorage.removeItem('goa_s2_c');localStorage.removeItem('goa_s2_s');SM.init()}
};

/* ================================================================
   VALIDATION ENGINE (V2-001 through V2-018)
   ================================================================ */
var VE={
  err:function(rule,ent,sev,msg,res){return {error_id:CCDM.uid('err'),timestamp:new Date().toISOString(),rule:rule,entity:ent,severity:sev,message:msg,resolution:res||''}},
  runAll:function(c){
    var e=[];
    for(var i=1;i<=18;i++){var fn=VE['v'+i];if(fn)e=e.concat(fn(c))}
    return e;
  },
  hasBlocking:function(r){return r.some(function(x){return x.severity==='blocking'})},
  countBy:function(r){var c={blocking:0,warning:0,informational:0};r.forEach(function(x){c[x.severity]=(c[x.severity]||0)+1});return c},
  v1:function(c){var e=[];c.requirements_baseline.requirements.forEach(function(r){
    if(!r.requirement_id)e.push(VE.err('V2-001',r.requirement_id||'?','blocking','Missing requirement_id','Add requirement ID'));
    if(!r.field_name)e.push(VE.err('V2-001',r.requirement_id||'?','blocking','Missing field_name on requirement','Add field name'));
  });return e},
  v2:function(c){return [VE.err('V2-002','system','informational','Lock state enforcement active. Baseline protected when status is not Draft.','')]},
  v3:function(c){var e=[];c.entities.submission_files.forEach(function(f){
    if(!EN.fileType.includes(f.file_type))e.push(VE.err('V2-003',f.file_name,'blocking','Unsupported file type: '+f.file_type,'Use CSV, XLS, XLSX, PDF, DOC, or DOCX'));
  });return e},
  v4:function(c){var e=[],seen={};c.entities.submission_files.forEach(function(f){
    if(seen[f.file_name])e.push(VE.err('V2-004',f.file_name,'blocking','Duplicate submission file: '+f.file_name,'Remove or rename duplicate'));
    seen[f.file_name]=true;
  });return e},
  v5:function(c){var e=[],reqs=c.requirements_baseline.requirements,profs=c.requirements_baseline.field_profile;
    reqs.forEach(function(r){
      if(!profs.some(function(p){return p.requirement_id===r.requirement_id}))
        e.push(VE.err('V2-005',r.requirement_id,'warning','No field profile for requirement','Generate field profile'));
    });return e},
  v6:function(c){var e=[],cfg=c.scan_configuration;
    if(cfg.threshold_high<0||cfg.threshold_high>100)e.push(VE.err('V2-006','config','blocking','High threshold out of range: '+cfg.threshold_high,'Set between 0-100'));
    if(cfg.threshold_medium<0||cfg.threshold_medium>100)e.push(VE.err('V2-006','config','blocking','Medium threshold out of range: '+cfg.threshold_medium,'Set between 0-100'));
    if(cfg.threshold_high<=cfg.threshold_medium)e.push(VE.err('V2-006','config','blocking','High threshold must exceed medium','Adjust thresholds'));
    return e},
  v7:function(c){var e=[],sfIds=new Set(c.entities.submission_files.map(function(f){return f.submission_file_id})),
    rIds=new Set(c.requirements_baseline.requirements.map(function(r){return r.requirement_id}));
    c.entities.findings.forEach(function(f){
      if(!sfIds.has(f.submission_file_id))e.push(VE.err('V2-007',f.finding_id,'blocking','Finding references invalid file: '+f.submission_file_id,'Correct reference'));

/* ================================================================
   COMPLETENESS ENGINE - 5 Detection Strategies (Section 5.5.1)
   ================================================================ */
var CE={
  normalize:function(s){return (s||'').toLowerCase().replace(/[^a-z0-9 ]/g,'').trim()},
  similarity:function(a,b){
    a=CE.normalize(a);b=CE.normalize(b);if(!a||!b)return 0;if(a===b)return 1;
    var bg=function(s){var r=[];for(var i=0;i<s.length-1;i++)r.push(s.slice(i,i+2));return r};
    var aB=bg(a),bB=bg(b),inter=0;
    bB.forEach(function(x){var idx=aB.indexOf(x);if(idx>=0){inter++;aB.splice(idx,1)}});
    return aB.length+bB.length+inter===0?0:(2*inter)/(bg(a).length+bg(b).length);
  },
  inferType:function(vals){
    if(!vals||vals.length===0)return 'string';
    var nums=0,bools=0,dates=0;
    vals.forEach(function(v){
      var s=String(v).trim().toLowerCase();
      if(s===''||s==='n/a'||s==='-')return;
      if(!isNaN(Number(s)))nums++;
      else if(['yes','no','true','false','y','n','1','0'].includes(s))bools++;
      else if(!isNaN(Date.parse(s))&&s.length>4)dates++;
    });
    var total=vals.filter(function(v){var s=String(v).trim();return s!==''&&s!=='n/a'&&s!=='-'}).length;
    if(total===0)return 'string';
    if(nums/total>.7)return 'number';
    if(bools/total>.7)return 'boolean';
    if(dates/total>.5)return 'date';
    return 'string';
  },
  scanFile:function(ccdm,sfId,headers,rows){
    var reqs=ccdm.requirements_baseline.requirements;
    var profs=ccdm.requirements_baseline.field_profile;
    var cfg=ccdm.scan_configuration;
    var findings=[];
    var normHeaders=headers.map(CE.normalize);

    /* Helper: check if a matched column has actual data */
    var checkPopulated=function(colIdx){
      if(colIdx<0||!rows||rows.length===0)return {populated:false,sampleValue:'',populatedCount:0,totalRows:rows?rows.length:0};
      var populated=0;
      var sampleVal='';
      var placeholders=['','n/a','-','na','tbd','select one','-select one-','null','none','0'];
      for(var r=0;r<rows.length;r++){
        var val=rows[r]&&rows[r][colIdx]!==undefined?String(rows[r][colIdx]).trim():'';
        if(val!==''&&!placeholders.includes(val.toLowerCase())){
          populated++;
          if(!sampleVal)sampleVal=val.length>200?val.substring(0,200)+'...':val;
        }
      }
      return {populated:populated>0,sampleValue:sampleVal,populatedCount:populated,totalRows:rows.length};
    };

    reqs.forEach(function(req){
      var prof=profs.find(function(p){return p.requirement_id===req.requirement_id});
      if(prof&&!prof.included_in_scan){
        findings.push(CCDM.createFinding({submission_file_id:sfId,file_name:'',requirement_id:req.requirement_id,field_name:req.field_name,mandatory:req.mandatory,response_type:req.response_type,section_id:req.section_id,presence_classification:'Excluded',detection_method:'',confidence_contribution:0,complexity_flag:prof?prof.complexity_flag:''}));
        return;
      }
      /* Template-awareness */
      var fileTemplate=sfId?((ccdm.entities.submission_files.find(function(f){return f.submission_file_id===sfId})||{}).template_type||'Unknown'):'Unknown';
      var reqScope=req.template_scope||'Both';
      if(reqScope!=='Both'&&fileTemplate!=='Unknown'&&reqScope!==fileTemplate){
        findings.push(CCDM.createFinding({submission_file_id:sfId,file_name:'',requirement_id:req.requirement_id,field_name:req.field_name,mandatory:req.mandatory,response_type:req.response_type,section_id:req.section_id,presence_classification:'Not Applicable',detection_method:'Template Scope',confidence_contribution:0,complexity_flag:prof?prof.complexity_flag:''}));
        return;
      }
      var bestScore=0,bestMethod='',bestColIdx=-1;
      var normField=CE.normalize(req.field_name);
      /* Strategy 1: Exact Label Match */
      var exactIdx=normHeaders.indexOf(normField);
      if(exactIdx>=0){bestScore=1;bestMethod='Exact Label';bestColIdx=exactIdx}
      /* Strategy 2: Fuzzy Label Match */
      if(bestScore<1){
        headers.forEach(function(h,i){
          var sim=CE.similarity(req.field_name,h);
          if(sim>bestScore&&sim>=0.6){bestScore=sim;bestMethod='Fuzzy Label';bestColIdx=i}
        });
      }
      /* Strategy 3: Structural Position Match */
      if(bestScore<0.6&&req.section_id){
        var secNum=parseInt(req.section_id.replace(/[^0-9]/g,''))||0;
        if(secNum>0&&secNum<=headers.length){
          var posScore=0.5;
          if(posScore>bestScore){bestScore=posScore;bestMethod='Structural Position';bestColIdx=secNum-1}
        }
      }
      /* Strategy 4: Response Type Match */
      if(bestScore<0.6&&rows.length>0){
        headers.forEach(function(h,i){
          var samples=rows.slice(0,10).map(function(r){return r[i]}).filter(function(v){return v!==undefined&&v!==null&&String(v).trim()!==''});
          var inferred=CE.inferType(samples);
          var expected=req.data_type||'string';
          if(inferred===expected){
            var sim=CE.similarity(req.field_name,h);
            var typeScore=0.4+sim*0.3;
            if(typeScore>bestScore){bestScore=typeScore;bestMethod='Response Type';bestColIdx=i}
          }
        });
      }
      /* Strategy 5: Table Header Match */
      if(bestScore<0.5){
        var keywords=normField.split(' ').filter(function(w){return w.length>2});
        headers.forEach(function(h,idx){
          var nh=CE.normalize(h);
          var matches=keywords.filter(function(k){return nh.includes(k)}).length;
          if(keywords.length>0&&matches/keywords.length>0.5){
            var headerScore=0.3+0.3*(matches/keywords.length);
            if(headerScore>bestScore){bestScore=headerScore;bestMethod='Table Header';bestColIdx=idx}
          }
        });
      }

      /* Value extraction: check if the matched column has data */
      var presence='Absent';
      var extractedValue='';
      var detectionNotes='';
      if(bestScore>0&&bestColIdx>=0){
        var valCheck=checkPopulated(bestColIdx);
        extractedValue=valCheck.sampleValue;
        if(valCheck.populated){
          if(bestScore>=0.8){
            presence='Present';
            detectionNotes=bestMethod+': header matched, '+valCheck.populatedCount+'/'+valCheck.totalRows+' rows populated';
          } else {
            presence='Partial';
            detectionNotes=bestMethod+': weak header match ('+Math.round(bestScore*100)+'%), '+valCheck.populatedCount+'/'+valCheck.totalRows+' rows populated';
          }
        } else {
          presence='Partial';
          detectionNotes=bestMethod+': header matched but no substantive values found in column';
          bestScore=bestScore*0.3;
        }
      } else if(bestScore>0){
        presence='Partial';
        detectionNotes=bestMethod+': header match only, no column data available';
      } else {
        presence='Absent';
        detectionNotes='No matching header or data found';
      }

      findings.push(CCDM.createFinding({submission_file_id:sfId,file_name:'',requirement_id:req.requirement_id,field_name:req.field_name,mandatory:req.mandatory,response_type:req.response_type,section_id:req.section_id,presence_classification:presence,detection_method:bestMethod,confidence_contribution:Math.round(bestScore*100),complexity_flag:prof?prof.complexity_flag:'',reviewer_notes:detectionNotes,extracted_value:extractedValue}));
    });
    return findings;
  },
  calculateCompleteness:function(ccdm,sfId){
    var findings=ccdm.entities.findings.filter(function(f){return f.submission_file_id===sfId});
    var cfg=ccdm.scan_configuration;
    var mPres=0,mAbs=0,mPart=0,oPres=0,oAbs=0,oTotal=0,mTotal=0,indet=0;
    var absentMandNames=[],absentOptNames=[],partialNames=[],indetNames=[];
    findings.forEach(function(f){
      if(f.presence_classification==='Excluded'||f.presence_classification==='Not Applicable')return;
      if(f.mandatory){
        mTotal++;
        if(f.presence_classification==='Present')mPres++;
        else if(f.presence_classification==='Partial'){mPart++;absentMandNames.push(f.field_name+' (Partial, '+f.section_id+')')}
        else if(f.presence_classification==='Absent'){mAbs++;absentMandNames.push(f.field_name+' ('+f.section_id+')')}
        else if(f.presence_classification==='Indeterminate'){indet++;indetNames.push(f.field_name);absentMandNames.push(f.field_name+' (Indeterminate, '+f.section_id+')')}
      } else {
        oTotal++;
        if(f.presence_classification==='Present')oPres++;
        else if(f.presence_classification==='Absent'){oAbs++;absentOptNames.push(f.field_name+' ('+f.section_id+')')}
        else if(f.presence_classification==='Partial'){absentOptNames.push(f.field_name+' (Partial, '+f.section_id+')')}
        else if(f.presence_classification==='Indeterminate'){indet++;indetNames.push(f.field_name);absentOptNames.push(f.field_name+' (Indeterminate, '+f.section_id+')')}
      }
    });
    var mandPct=mTotal>0?Math.round((mPres/mTotal)*100):0;
    var optPct=oTotal>0?Math.round((oPres/oTotal)*100):0;
    var optThreshold=cfg.optional_threshold||75;
    var status='Incomplete';
    if(mandPct===100&&optPct>=optThreshold)status='Complete';
    else if(mandPct===100&&optPct<optThreshold)status='Partially Complete';
    else status='Incomplete';
    if(findings.length===0){status='Incomplete';mandPct=0}
    var parts=[];
    if(mPres>0)parts.push(mPres+'/'+mTotal+' mandatory present');
    if(mAbs>0)parts.push(mAbs+' mandatory absent');
    if(mPart>0)parts.push(mPart+' mandatory partial');
    if(oPres>0)parts.push(oPres+'/'+oTotal+' optional present ('+optPct+'%)');
    if(indet>0)parts.push(indet+' indeterminate');
    var rationale=parts.join('; ')||'No findings';
    return CCDM.createConfAssessment({submission_file_id:sfId,completeness_status:status,completeness_pct:mandPct,mand_total:mTotal,mand_present:mPres,mand_absent:mAbs,mand_partial:mPart,opt_total:oTotal,opt_present:oPres,opt_absent:oAbs,opt_pct:optPct,indeterminate_count:indet,rationale:rationale,gap_mandatory:absentMandNames.join('; '),gap_optional:absentOptNames.join('; '),indeterminate_fields:indetNames.slice(0,5).join(', ')});
  }
};

function renderNav(phase){
  if(phase==='p1_purpose')return '';
  var parts=[];
  parts.push({id:'p1_import',label:'Part 1: Import',phases:['p1_import','p1_summary','p1_profile','p1_config']});
  parts.push({id:'p2_upload',label:'Part 2: Submissions',phases:['p2_upload','p2_summary']});
  parts.push({id:'p3',label:'Part 3: Workbook',phases:['p3']});
  var html='<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;padding:10px 16px;background:var(--w);border:1px solid var(--gb);border-radius:8px">';
  parts.forEach(function(p,i){
    var isActive=p.phases.includes(phase);
    var isAccessible=false;
    if(p.id==='p1_import')isAccessible=true;
    if(p.id==='p2_upload')isAccessible=SM.ses.isLocked;
    if(p.id==='p3')isAccessible=SM.ccdm.entities.findings.length>0;
    if(i>0)html+='<span style="color:var(--gb);font-size:18px">&rsaquo;</span>';
    if(isActive){
      html+='<span style="font-weight:700;color:var(--b);font-size:13px">'+p.label+'</span>';
    } else if(isAccessible){
      html+='<span style="cursor:pointer;color:var(--bd);font-size:13px;text-decoration:underline" onclick="app.navTo(\''+p.id+'\')">'+p.label+'</span>';
    } else {
      html+='<span style="color:var(--gb);font-size:13px">'+p.label+'</span>';
    }
  });
  html+='<span style="flex:1"></span>';
  html+='<button class="btn btn-r btn-sm" onclick="app.globalReset()">Reset</button>';
  html+='</div>';
  return html;
}

  '<h3>Purpose</h3><p>This Harness reviews grant submission files against a locked Requirements Baseline imported from Stage 1. It scans uploaded submission files (CSV, XLS, XLSX) for completeness and produces a structured Completeness Report with confidence assessments.</p>'+
  '<h3>What the Harness Can Do</h3><ul>'+
  '<li>Import an approved Requirements Workbook from Stage 1 (JSON or Excel)</li>'+
  '<li>Accept submission files in CSV, XLS, XLSX, PDF, DOC, and DOCX formats. CSV and Excel receive full automated detection. PDF, DOC, and DOCX require manual reviewer classification.</li>'+

  '<li>Calculate per-file completeness scores with confidence levels (H/M/L)</li>'+
  '<li>Generate structured completeness reports with traceability</li>'+
  '<li>Support manual overrides with audit trail</li></ul>'+
  '<h3>What the Harness Cannot Guarantee</h3><ul>'+
  '<li>Accurate extraction from corrupted files or files with non-standard encoding</li>'+
  '<li>Correct interpretation of ambiguous column headers or data structures</li>'+
  '<li>Detection of requirements satisfied through non-standard file layouts</li>'+
  '<li>Completeness assessment beyond the requirements defined in the baseline</li></ul>'+
  '<h3>User Responsibility</h3><p>Users must review all completeness findings before operational use. This tool assists with structured review; it does not replace human judgment.</p>'+
  '<div class="tc" style="margin-top:20px"><button class="btn btn-p" onclick="app.acknowledge()">I Understand - Proceed</button></div></div>';
}

/* Baseline Summary */
function renderBaselineSummary(c){
  var reqs=c.requirements_baseline.requirements;
  var filter=SM.ses._baselineFilter||'All';

  /* Build section data grouped by template */
  var rows=[];
  var sectionMap={};
  reqs.forEach(function(r){
    var t=r.template_scope||'Both';
    var s=r.section_id||'Unassigned';
    var key=t+'||'+s;
    if(!sectionMap[key])sectionMap[key]={template:t,section:s,total:0,mandatory:0,optional:0};
    sectionMap[key].total++;
    if(r.mandatory)sectionMap[key].mandatory++;
    else sectionMap[key].optional++;
  });
  Object.keys(sectionMap).forEach(function(k){rows.push(sectionMap[k])});

  /* Get unique template names for picklist */
  var templates=['All'];
  var tplSet={};
  reqs.forEach(function(r){var t=r.template_scope||'Both';if(!tplSet[t]){tplSet[t]=1;templates.push(t)}});

  /* Apply filter */
  var filtered=filter==='All'?rows:rows.filter(function(r){return r.template===filter});

  /* Calculate summary stats from filtered data */
  var totalReqs=0,mandReqs=0,optReqs=0,sectionCount={};
  filtered.forEach(function(r){totalReqs+=r.total;mandReqs+=r.mandatory;optReqs+=r.optional;sectionCount[r.section]=1});

  /* Sort */
  var sortCol=SM.ses._baselineSortCol||'template';
  var sortDir=SM.ses._baselineSortDir||'asc';
  filtered.sort(function(a,b){
    var va=a[sortCol]||'',vb=b[sortCol]||'';
    if(typeof va==='number'&&typeof vb==='number')return sortDir==='asc'?va-vb:vb-va;
    va=String(va).toLowerCase();vb=String(vb).toLowerCase();
    return sortDir==='asc'?va.localeCompare(vb):vb.localeCompare(va);
  });

  var src=c.requirements_baseline.source_import;

  /* Render */
  var html='<div class="card"><h1>Part 1: Requirements Baseline Imported</h1>';

  /* Summary tiles - reflect filter */
  html+='<div class="sc">';
  html+='<div class="scd"><div class="v">'+totalReqs+'</div><div class="l">Total Requirements'+(filter!=='All'?' ('+filter+')':'')+'</div></div>';
  html+='<div class="scd grn"><div class="v">'+mandReqs+'</div><div class="l">Mandatory</div></div>';
  html+='<div class="scd amb"><div class="v">'+optReqs+'</div><div class="l">Optional</div></div>';
  html+='<div class="scd"><div class="v">'+Object.keys(sectionCount).length+'</div><div class="l">Sections</div></div>';
  html+='<div class="scd"><div class="v">'+(templates.length-1)+'</div><div class="l">'+(templates.length>2?'Templates':'Template')+'</div></div>';
  html+='</div>';

  /* Picklist */
  html+='<div style="display:flex;align-items:center;gap:12px;margin:16px 0">';
    html+='<label style="font-size:13px;font-weight:600;color:var(--gr)">Filter by Template:</label>';
    html+='<select id="baselineFilter" onchange="app.setBaselineFilter(this.value)" style="padding:6px 12px;border:1px solid var(--gb);border-radius:6px;font-size:13px;font-family:var(--f)">';
    templates.forEach(function(t){
      html+='<option value="'+t+'"'+(t===filter?' selected':'')+'>'+t+(t==='All'?' ('+reqs.length+' requirements)':'')+'</option>';
    });
    html+='</select>';
    html+='<span style="flex:1"></span>';
    html+='<button class="btn btn-s btn-sm" onclick="app.navTo(\'p1_import\')">&laquo; Back to Import</button>';
    html+='<button class="btn btn-p btn-sm" style="margin-left:8px" onclick="app.goToProfile()">Proceed to Scan Configuration</button>';
    html+='</div>';

  /* Sort arrow helper */
  var arrow=function(col){
    if(sortCol!==col)return ' <span style="color:var(--gb);font-size:10px">&#9650;&#9660;</span>';
    return sortDir==='asc'?' <span style="font-size:10px">&#9650;</span>':' <span style="font-size:10px">&#9660;</span>';
  };

  /* Table */
  html+='<div class="gw"><table><tr>';
  html+='<th style="cursor:pointer" onclick="app.sortBaseline(\'template\')">Template'+arrow('template')+'</th>';
  html+='<th style="cursor:pointer" onclick="app.sortBaseline(\'section\')">Section'+arrow('section')+'</th>';
  html+='<th style="cursor:pointer;text-align:center" onclick="app.sortBaseline(\'total\')">Total'+arrow('total')+'</th>';
  html+='<th style="cursor:pointer;text-align:center" onclick="app.sortBaseline(\'mandatory\')">Mandatory'+arrow('mandatory')+'</th>';
  html+='<th style="cursor:pointer;text-align:center" onclick="app.sortBaseline(\'optional\')">Optional'+arrow('optional')+'</th>';
  html+='</tr>';
  filtered.forEach(function(r,i){
    var tplColor=r.template==='Both'?'#E0E7FF':r.template==='Enhancement'?'#DBEAFE':'#FCE7F3';
    html+='<tr style="'+(i%2===1?'background:var(--ra)':'')+'">'+
    '<td style="font-size:13px">'+r.template+'</td>'+
    '<td>'+r.section+'</td>'+
    '<td style="text-align:center">'+r.total+'</td>'+
    '<td style="text-align:center">'+r.mandatory+'</td>'+
    '<td style="text-align:center">'+r.optional+'</td>'+
    '</tr>';
  });

  /* Totals row */
  html+='<tr style="background:var(--bl);font-weight:700">'+
  '<td colspan="2">Total'+(filter!=='All'?' ('+filter+')':'')+'</td>'+
  '<td style="text-align:center">'+totalReqs+'</td>'+
  '<td style="text-align:center">'+mandReqs+'</td>'+
  '<td style="text-align:center">'+optReqs+'</td></tr>';
  html+='</table></div>';

  /* Source */
  html+='<h3>Source</h3><p style="font-size:13px;color:var(--gr)">'+src.file_name+' ('+src.format+') imported at '+new Date(src.import_timestamp).toLocaleString()+'</p>';html+='</div>';
  return html;
}

    '<div class="tc" style="margin-top:20px"><button class="btn btn-s" onclick="app.navTo(\'p1_summary\')" style="margin-right:8px">&laquo; Back to Summary</button><button class="btn btn-g" onclick="app.lockBaseline()">&#128274; Lock Requirements Baseline</button></div>'+

function renderUpload(c,ses){
  var files=c.entities.submission_files;
  var sorted=files.slice().sort(function(a,b){
    if(ses.sortMode==='alpha-az')return a.file_name.localeCompare(b.file_name);
    if(ses.sortMode==='alpha-za')return b.file_name.localeCompare(a.file_name);
    return a.sort_order-b.sort_order;
  });
  var fHtml='';
  sorted.forEach(function(f,i){
    var stColor=f.processing_status.indexOf('Readable')===0?'var(--g)':f.processing_status.indexOf('Unreadable')===0?'var(--r)':f.processing_status==='Checking...'?'var(--am)':'var(--am)';
    fHtml+='<div class="fi"><span class="n">'+f.file_name+' ('+f.file_type+')</span>'+
    '<span style="color:'+stColor+';font-size:12px;font-weight:600">'+f.processing_status+'</span>'+
    '<button class="btn btn-r btn-sm" onclick="app.removeSubFile(\''+f.submission_file_id+'\')">&times;</button></div>';
  });
  return '<div class="card"><h1>Part 2: Submission Ingestion</h1>'+
  '<div class="lb lk">&#128274; Requirements Baseline Locked ('+c.requirements_baseline.requirements.length+' requirements)</div>'+
  '<h3>Upload Grant Application Submission Files</h3>'+
  '<div class="dz" id="subdz" ondrop="app.handleSubDrop(event)" ondragover="event.preventDefault();this.classList.add(\'ov\')" ondragleave="this.classList.remove(\'ov\')">'+
  '<p>Drag &amp; drop submission files here or click to browse</p>'+
  '<p style="font-size:12px">Supported: CSV, XLS, XLSX, PDF, DOC, DOCX</p>'+
'<input type="file" id="subinput" accept=".csv,.xls,.xlsx,.pdf,.doc,.docx" multiple style="display:none" onchange="app.handleSubSelect(event)"></div>'+
  '<div style="display:flex;gap:12px;align-items:center;margin:12px 0">'+
  '<label style="font-size:13px;font-weight:500">Sort:</label>'+
  '<select onchange="app.changeSort(this.value)">'+
    '<option value="upload"'+(ses.sortMode==='upload'?' selected':'')+'> Upload Order</option>'+
    '<option value="alpha-az"'+(ses.sortMode==='alpha-az'?' selected':'')+'> Alphabetical A-Z</option>'+
    '<option value="alpha-za"'+(ses.sortMode==='alpha-za'?' selected':'')+'> Alphabetical Z-A</option></select>'+
    '<span style="flex:1"></span>'+
    (function(){
      var readable=files.filter(function(f){return f.processing_status.indexOf('Readable')===0}).length;
      var checking=files.filter(function(f){return f.processing_status==='Checking...'}).length;
      var canScan=readable>0&&checking===0;
      var label='&#9654; Scan for Completeness';
      if(files.length>0)label+=' ('+readable+' readable)';
      return '<button class="btn btn-p btn-sm" onclick="app.runScan()"'+(!canScan?' disabled':'')+'>'+label+'</button>';
    })()+
    '<button class="btn btn-s btn-sm" style="margin-left:8px" onclick="app.backToPart1()">&#128275; Unlock Baseline</button></div>'+
    fHtml+'</div>';
}

function renderScanSummary(c,s){
  var files=c.entities.submission_files;
  var findings=c.entities.findings;
  var reqs=c.requirements_baseline.requirements;
  var cas=c.entities.confidence_assessments;
  var totalFiles=files.length;
  var totalFindings=findings.length;
  var cfg=c.scan_configuration;

  /* Build per-file data */
  var fileRows=[];
  var complete=0,partial=0,incomplete=0;
  files.forEach(function(sf){
    var ca=cas.find(function(a){return a.submission_file_id===sf.submission_file_id})||{};
    var status=ca.completeness_status||'Incomplete';
    var pct=ca.completeness_pct||0;
    if(status==='Complete')complete++;
    else if(status==='Partially Complete')partial++;
    else incomplete++;

    /* Build gap bullets grouped by section */
    var gapHtml='';
    var mandGaps=(ca.gap_mandatory||'').split('; ').filter(function(g){return g!==''});
    var optGaps=(ca.gap_optional||'').split('; ').filter(function(g){return g!==''});

    if(mandGaps.length>0){
      var mandSections={};
      mandGaps.forEach(function(g){
        var secMatch=g.match(/\((?:Partial, )?(.+)\)$/);
        var sec=secMatch?secMatch[1]:'Unknown';
        var fname=g.replace(/\s*\((?:Partial, )?.+\)$/,'');
        if(!mandSections[sec])mandSections[sec]=[];
        mandSections[sec].push(fname);
      });
      gapHtml+='<div style="font-size:12px;font-weight:600;margin-top:4px">Mandatory:</div><ul style="margin:2px 0 4px 16px;font-size:12px">';
      Object.keys(mandSections).sort().forEach(function(sec){
        gapHtml+='<li>'+sec+': '+mandSections[sec].join(', ')+'</li>';
      });
      gapHtml+='</ul>';
    }
    if(optGaps.length>0){
      var optSections={};
      optGaps.forEach(function(g){
        var secMatch=g.match(/\((?:Partial, )?(.+)\)$/);
        var sec=secMatch?secMatch[1]:'Unknown';
        var fname=g.replace(/\s*\((?:Partial, )?.+\)$/,'');
        if(!optSections[sec])optSections[sec]=[];
        optSections[sec].push(fname);
      });
      gapHtml+='<div style="font-size:12px;font-weight:600;margin-top:4px">Optional:</div><ul style="margin:2px 0 4px 16px;font-size:12px">';
      Object.keys(optSections).sort().forEach(function(sec){
        gapHtml+='<li>'+sec+': '+optSections[sec].join(', ')+'</li>';
      });
      gapHtml+='</ul>';
    }
    if(!gapHtml)gapHtml='<span style="font-size:12px;color:var(--gr)">None</span>';

    fileRows.push({name:sf.file_name,template:sf.template_type||'Unknown',pct:pct,status:status,gap:gapHtml,gapCount:mandGaps.length+optGaps.length});
  });

  /* Filter */
  var scanFilter=s._scanFilter||'All';
  var templates=['All'];
  var tplSet={};
  files.forEach(function(f){var t=f.template_type||'Unknown';if(!tplSet[t]){tplSet[t]=1;templates.push(t)}});
  var scanSearch=(s._scanSearch||'').toLowerCase();
  var filtered=fileRows;
  if(scanFilter!=='All')filtered=filtered.filter(function(r){return r.template===scanFilter});
  if(scanSearch)filtered=filtered.filter(function(r){return r.name.toLowerCase().indexOf(scanSearch)>=0});

  /* Sort */
  var sortCol=s._scanSortCol||'name';
  var sortDir=s._scanSortDir||'asc';
  filtered.sort(function(a,b){
    var va,vb;
    if(sortCol==='pct'){return sortDir==='asc'?a.pct-b.pct:b.pct-a.pct}
    if(sortCol==='status'){var ord={Incomplete:0,'Partially Complete':1,Complete:2};va=ord[a.status]!==undefined?ord[a.status]:0;vb=ord[b.status]!==undefined?ord[b.status]:0;return sortDir==='asc'?va-vb:vb-va}
    if(sortCol==='gapCount'){return sortDir==='asc'?a.gapCount-b.gapCount:b.gapCount-a.gapCount}
    va=String(a[sortCol]||'').toLowerCase();vb=String(b[sortCol]||'').toLowerCase();
    return sortDir==='asc'?va.localeCompare(vb):vb.localeCompare(va);
  });

  var arrow=function(col){
    if(sortCol!==col)return ' <span style="color:var(--gb);font-size:10px">&#9650;&#9660;</span>';
    return sortDir==='asc'?' <span style="font-size:10px">&#9650;</span>':' <span style="font-size:10px">&#9660;</span>';
  };

  /* Avg completeness */
  var avgPct=totalFiles>0?Math.round(fileRows.reduce(function(sum,r){return sum+r.pct},0)/totalFiles):0;

  var html='<div class="card"><h1>Scan Complete</h1>';

  /* Summary tiles */
  html+='<div class="sc">';
  html+='<div class="scd"><div class="v">'+totalFiles+'</div><div class="l">Files Scanned</div></div>';
  html+='<div class="scd"><div class="v">'+reqs.length+'</div><div class="l">Requirements in Baseline</div></div>';
  html+='<div class="scd"><div class="v">'+totalFindings+'</div><div class="l">Findings Generated</div></div>';
  html+='<div class="scd"><div class="v">'+avgPct+'%</div><div class="l">Avg Completeness</div></div>';
  html+='</div>';

  /* Completeness status tiles */
  html+='<h3 style="margin:16px 0 4px">Submission Completeness</h3>';
  html+='<p style="font-size:12px;color:var(--gr);margin-bottom:12px">Each file is assessed based on whether mandatory and optional fields contain substantive values. Completeness % reflects mandatory fields only. Status considers both mandatory (100% required) and optional (>='+cfg.optional_threshold+'% for Complete).</p>';
  html+='<div class="sc">';
  html+='<div class="scd grn"><div class="v">'+complete+'</div><div class="l">Complete</div></div>';
  html+='<div class="scd amb"><div class="v">'+partial+'</div><div class="l">Partially Complete</div></div>';
  html+='<div class="scd" style="background:#fef2f2"><div class="v" style="color:var(--e)">'+incomplete+'</div><div class="l">Incomplete</div></div>';
  html+='</div>';

  /* Toolbar: filter, search, buttons */

/* ================================================================
   RENDER GRID
   ================================================================ */
function renderGrid(c,ses,tabId){
  var cols=CCDM.defaultColumns().filter(function(col){return col.tab===tabId});
  var rows=getTabData(c,tabId);
  var tab=CCDM.defaultTabs().find(function(t){return t.tab_id===tabId});
  var editableFields=(tab&&tab.editable_fields)||[];
  /* Filter by file selection (except Requirements Baseline and Submission Inventory) */
  if(tabId==='tab_cs'||tabId==='tab_fd'||tabId==='tab_cr'){
    rows=filterBySelection(rows,ses,'submission_file_id');
    /* Sort by Part 2 sort order */
    var sfOrder={};
    c.entities.submission_files.forEach(function(f){sfOrder[f.submission_file_id]=f.sort_order});
    rows=rows.slice().sort(function(a,b){return (sfOrder[a.submission_file_id]||0)-(sfOrder[b.submission_file_id]||0)});
  }
  /* Apply search and column sort */
  rows=applySortAndSearch(rows,cols,tabId,ses);
  /* Selection banner (not on Submission Inventory) */
  var html='';
  if(tabId!=='tab_si')html+=renderSelectionBanner(c,ses);
  html+=renderSearchBar(tabId,ses);
  /* Bulk classify toolbar for Field Detail */
  if(tabId==='tab_fd'&&!ses.isApproved){
    html+='<div class="ba"><select id="bulkPresence"><option value="">Bulk Classify Selected...</option>';
    EN.presence.forEach(function(p){if(p!=='Excluded')html+='<option value="'+p+'">'+p+'</option>'});
    html+='</select><button class="btn btn-s btn-sm" onclick="app.bulkClassify()">Apply</button></div>';
  }
  html+='<div class="gw"><table><tr>';
  /* Checkboxes for Field Detail and Submission Inventory */
  var showCheck=(tabId==='tab_fd'||tabId==='tab_si');
  if(showCheck)html+='<th style="width:30px"><input type="checkbox" onchange="app.selectAllRows(\''+tabId+'\',this.checked)"></th>';
  cols.forEach(function(col){
    var sortIcon='';
    if(ses.gridSortCol&&ses.gridSortCol[tabId]===col.field)sortIcon=ses.gridSortAsc[tabId]!==false?' &#9650;':' &#9660;';
    html+='<th style="cursor:pointer" onclick="app.toggleSort(\''+tabId+'\',\''+col.field+'\')">'+col.name+sortIcon+'</th>';
  });
  html+='</tr>';
  if(rows.length===0){
    html+='<tr><td colspan="'+(cols.length+(showCheck?1:0))+'" class="tc" style="padding:20px;color:var(--gr)">No records</td></tr>';
  } else {
    rows.forEach(function(row,ri){
      var rowId=row.finding_id||row.submission_file_id||row.requirement_id||ri;
      var isChecked=false;
      if(tabId==='tab_si')isChecked=ses.selectedFileIds&&ses.selectedFileIds.includes(row.submission_file_id);
      if(tabId==='tab_fd')isChecked=ses._fdSelected&&ses._fdSelected.includes(rowId);
      html+='<tr>';
      if(showCheck){
        if(tabId==='tab_si')html+='<td><input type="checkbox" '+(isChecked?'checked':'')+' onchange="app.toggleFileSelect(\''+row.submission_file_id+'\',this.checked)"></td>';
        else html+='<td><input type="checkbox" '+(isChecked?'checked':'')+' onchange="app.toggleFdSelect(\''+rowId+'\',this.checked)"></td>';
      }
      cols.forEach(function(col){
        var val=row[col.field];
        if(typeof val==='boolean')val=val?'Yes':'No';
        if(val===null||val===undefined)val='';
        if(Array.isArray(val))val=val.join(', ');
        var display=String(val);
        if(col.field==='presence_classification'&&val)display=presenceBadge(val);
        if(col.field==='confidence_level'&&val)display=confBadge(val);
        if(col.field==='detection_method'&&row.detection_method==='Manual Override')display+='<span class="oi"></span>';
        var canEdit=!ses.isApproved&&editableFields.includes(col.field);
        html+='<td'+(canEdit?' contenteditable="true" data-row="'+ri+'" data-field="'+col.field+'" data-tab="'+tabId+'" onblur="app.editCell(this)"':'')+'>';
        html+=display+'</td>';
      });
      html+='</tr>';
    });
  }
  html+='</table></div>';
  html+='<div style="font-size:12px;color:var(--gr);margin-top:6px">'+rows.length+' record(s)</div>';
  return html;
}

/* ================================================================
   SELECTION BANNER + GRID CONTROLS
   ================================================================ */
function getSelectedFiles(c,ses){
  if(!ses.selectedFileIds||ses.selectedFileIds.length===0)return c.entities.submission_files.map(function(f){return f.submission_file_id});
  return ses.selectedFileIds;
}
function filterBySelection(rows,ses,fileIdField){
  if(!ses.selectedFileIds||ses.selectedFileIds.length===0)return rows;
  return rows.filter(function(r){return ses.selectedFileIds.includes(r[fileIdField])});
}
function renderSelectionBanner(c,ses){
  var total=c.entities.submission_files.length;
  if(total===0)return '';
  var selCount=ses.selectedFileIds?ses.selectedFileIds.length:0;
  var isAll=selCount===0||selCount===total;
  var label='';
  if(isAll){label='All files ('+total+')'}
  else{
    var names=c.entities.submission_files.filter(function(f){return ses.selectedFileIds.includes(f.submission_file_id)}).map(function(f){return f.file_name});
    var display=names.slice(0,4).join(', ');
    if(names.length>4)display+=' ...and '+(names.length-4)+' more';
    label='<strong>'+selCount+' of '+total+' files selected</strong> | Showing: '+display;
  }
  return '<div class="lb lk" style="justify-content:space-between">'+
  '<span>'+label+'</span>'+
  '<button class="btn btn-s btn-sm" onclick="app.switchTab(\'tab_si\')">'+(isAll?'Filter by File':'Modify Selection')+'</button></div>';
}
function renderSearchBar(tabId,ses){
  var val=(ses.gridSearch&&ses.gridSearch[tabId])||'';
  return '<div style="margin-bottom:8px"><input type="text" placeholder="Search..." value="'+val+'" oninput="app.setSearch(\''+tabId+'\',this.value)" style="padding:6px 12px;border:1px solid var(--gb);border-radius:4px;width:260px;font-size:13px"></div>';
}
function applySortAndSearch(rows,cols,tabId,ses){
  var search=(ses.gridSearch&&ses.gridSearch[tabId])||'';
  if(search){
    var s=search.toLowerCase();
    rows=rows.filter(function(r){
      return cols.some(function(col){
        var v=r[col.field];
        if(v===null||v===undefined)return false;
        return String(v).toLowerCase().indexOf(s)>=0;
      });
    });
  }
  var sortCol=ses.gridSortCol&&ses.gridSortCol[tabId];
  if(sortCol){
    var asc=ses.gridSortAsc&&ses.gridSortAsc[tabId]!==false;
    rows=rows.slice().sort(function(a,b){
      var va=a[sortCol],vb=b[sortCol];
      if(va===null||va===undefined)va='';
      if(vb===null||vb===undefined)vb='';
      if(typeof va==='number'&&typeof vb==='number')return asc?va-vb:vb-va;
      return asc?String(va).localeCompare(String(vb)):String(vb).localeCompare(String(va));
    });
  }
  return rows;
}

/* ================================================================
   MAIN APPLICATION
   ================================================================ */
var app={
  _repairIssues:[],
  init:function(){
    if(!SM.load())SM.init();
    app.render();
  },
  render:function(){
    var el=document.getElementById('app');
    var s=SM.ses;
    var nav=renderNav(s.phase);
    switch(s.phase){
      case 'p1_purpose':el.innerHTML=renderPurpose();break;
      case 'p1_import':el.innerHTML=nav+renderImport(s);document.getElementById('s1dz').onclick=function(){document.getElementById('s1input').click()};break;
      case 'p1_summary':el.innerHTML=nav+renderBaselineSummary(SM.ccdm);break;
      case 'p1_config':el.innerHTML=nav+renderConfig(SM.ccdm);break;
      case 'p2_upload':el.innerHTML=nav+renderUpload(SM.ccdm,s);document.getElementById('subdz').onclick=function(){document.getElementById('subinput').click()};break;
      case 'p2_summary':el.innerHTML=nav+renderScanSummary(SM.ccdm,s);break;
      case 'p3':el.innerHTML=nav+renderWorkbook(SM.ccdm,s);break;
      default:el.innerHTML=renderPurpose();
    }
  },
  showModal:function(html){document.getElementById('mc').innerHTML=html;document.getElementById('mo').classList.add('sh')},
  hideModal:function(){document.getElementById('mo').classList.remove('sh');document.getElementById('mc').innerHTML=''},
  /* Part 1 */
  acknowledge:function(){SM.transition('p1_import');app.render()},
  handleS1Drop:function(e){e.preventDefault();e.currentTarget.classList.remove('ov');
    Array.from(e.dataTransfer.files).forEach(function(f){SM.ses.s1Files.push({name:f.name,size:f.size,type:f.type,_ref:f.name});SM._fileStore[f.name]=f});
    SM.persist();app.render()},
  handleS1Select:function(e){
    Array.from(e.target.files).forEach(function(f){SM.ses.s1Files.push({name:f.name,size:f.size,type:f.type,_ref:f.name});SM._fileStore[f.name]=f});
    SM.persist();app.render()},
  removeS1:function(i){SM.ses.s1Files.splice(i,1);SM.persist();app.render()},
  importS1:function(){
    var f=SM.ses.s1Files[0];if(!f){alert('Upload a file first.');return}
    var file=SM._fileStore[f._ref];
    if(!file){alert('File data not available. Please re-upload.');return}
    var ext=f.name.split('.').pop().toLowerCase();
    if(ext==='json'){
      var reader=new FileReader();
      reader.onload=function(ev){
        try{
          var data=JSON.parse(ev.target.result);
          var reqs=[];
          if(data.entities&&data.entities.requirements){reqs=data.entities.requirements}
          else if(data.requirements_baseline&&data.requirements_baseline.requirements){reqs=data.requirements_baseline.requirements}
          if(reqs.length===0){alert('No requirements found in JSON.');return}
          SM.update(function(c){
            c.requirements_baseline.requirements=reqs;
            c.requirements_baseline.field_profile=reqs.map(function(r){return CCDM.createFieldProfile({requirement_id:r.requirement_id})});
            c.requirements_baseline.source_import={file_name:f.name,format:'JSON',version_id:data.workbook_metadata?data.workbook_metadata.version_id:null,import_timestamp:new Date().toISOString()};
            c.schema.data_dictionary.source_files=[{name:f.name,type:'JSON'}];
            c.schema.data_dictionary.generated_timestamp=new Date().toISOString();
          },'Imported Stage 1 JSON: '+reqs.length+' requirements');
            CCDM.remapRequirementIds(SM.ccdm);
            VM.snapshot(SM.ccdm,'Imported','Pass');SM.persist();
          SM.transition('p1_summary');app.render();
        }catch(ex){alert('Error parsing JSON: '+ex.message)}
      };
      reader.readAsText(file);
    } else if(ext==='xlsx'||ext==='xls'){
      var reader=new FileReader();
      reader.onload=function(ev){
        try{
          var wb=XLSX.read(ev.target.result,{type:'array'});
          var ws=wb.Sheets['Requirements']||wb.Sheets[wb.SheetNames[0]];
          if(!ws){alert('No Requirements sheet found.');return}
          var rows=XLSX.utils.sheet_to_json(ws,{defval:''});
          var reqs=rows.map(function(row){
            return CCDM.createReq({
              requirement_id:row['Requirement ID']||row['requirement_id']||CCDM.uid('req'),
              field_name:row['Field Name']||row['field_name']||'',
              mandatory:String(row['Mandatory']||row['mandatory']||'').toLowerCase()==='yes'||row['mandatory']===true,
              response_type:row['Response Type']||row['response_type']||'free-text',

              template_scope:row['Template']||row['template_scope']||'Both',
              evidence_requirements:row['Evidence Requirements']||'',

            });
          });
if(reqs.length===0){alert('No requirements found in spreadsheet.');return}
          SM.update(function(c){

            c.requirements_baseline.field_profile=reqs.map(function(r){return CCDM.createFieldProfile({requirement_id:r.requirement_id})});
            c.requirements_baseline.source_import={file_name:f.name,format:'Excel',version_id:null,import_timestamp:new Date().toISOString()};
            c.schema.data_dictionary.source_files=[{name:f.name,type:'Excel'}];

          },'Imported Stage 1 Excel: '+reqs.length+' requirements');
            CCDM.remapRequirementIds(SM.ccdm);
            VM.snapshot(SM.ccdm,'Imported','Pass');SM.persist();
            SM.transition('p1_summary');app.render();
        }catch(ex){alert('Error reading Excel: '+ex.message)}
      };
      reader.readAsArrayBuffer(file);
    } else {alert('Unsupported format. Use JSON or XLSX.')}
  },

  _addSubFile:function(f){

    if(!EN.fileType.includes(ext)){alert(f.name+': unsupported format. Use CSV, XLS, XLSX, PDF, DOC, or DOCX.');return}
    var tpl='Unknown';
    var fn=f.name.toLowerCase();
    if(fn.indexOf(' en ')>=0||fn.indexOf(' en-')>=0||fn.indexOf('-en ')>=0||fn.indexOf('enhancement')>=0)tpl='Enhancement';
    else if(fn.indexOf(' su ')>=0||fn.indexOf(' su-')>=0||fn.indexOf('-su ')>=0||fn.indexOf('start-up')>=0||fn.indexOf('startup')>=0)tpl='Start-Up';
    var sf=CCDM.createSubFile({file_name:f.name,file_type:ext,template_type:tpl,processing_status:'Checking...',sort_order:SM.ccdm.entities.submission_files.length});
    SM.ccdm.entities.submission_files.push(sf);

  _checkReadability:function(sf,file){
    var ext=sf.file_type;
    if(ext==='CSV'){
      var reader=new FileReader();
      reader.onload=function(ev){
        var text=ev.target.result||'';
        var lines=text.split('\n').filter(function(l){return l.trim()!==''});
        if(lines.length>0){sf.processing_status='Readable ('+lines.length+' rows)'}
        else{sf.processing_status='Unreadable (empty file)'}
        SM.persist();app.render();
      };
      reader.onerror=function(){sf.processing_status='Unreadable (read error)';SM.persist();app.render()};
      reader.readAsText(file);
    } else if(ext==='XLS'||ext==='XLSX'){
      var reader=new FileReader();
      reader.onload=function(ev){
        try{
          var wb=XLSX.read(ev.target.result,{type:'array',sheetRows:5});
          var totalRows=0;
          wb.SheetNames.forEach(function(sn){
            var ws=wb.Sheets[sn];
            var data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
            totalRows+=data.length;
          });
          sf.sheet_count=wb.SheetNames.length;
          if(totalRows>0){sf.processing_status='Readable ('+wb.SheetNames.length+' sheet'+(wb.SheetNames.length>1?'s':'')+')'}
          else{sf.processing_status='Unreadable (no data)'}
        }catch(e){sf.processing_status='Unreadable ('+e.message+')'}
        SM.persist();app.render();
      };
      reader.onerror=function(){sf.processing_status='Unreadable (read error)';SM.persist();app.render()};
      reader.readAsArrayBuffer(file);
    } else if(ext==='PDF'&&window.pdfjsLib){
      var reader=new FileReader();
      reader.onload=function(ev){
        pdfjsLib.getDocument({data:ev.target.result}).promise.then(function(pdf){
          pdf.getPage(1).then(function(page){
            page.getTextContent().then(function(content){
              var text=content.items.map(function(i){return i.str}).join(' ').trim();
              if(text.length>50&&text.indexOf('Please wait')<0&&text.indexOf('cannot be opened')<0&&text.indexOf('form will not work')<0&&text.indexOf('save the file')<0){
                sf.processing_status='Readable ('+pdf.numPages+' page'+(pdf.numPages>1?'s':'')+')'
              } else {
                sf.processing_status='Unreadable (XFA or no text layer)'
              }
              SM.persist();app.render();
            });
          });
        }).catch(function(){sf.processing_status='Unreadable (PDF parse error)';SM.persist();app.render()});
      };
      reader.onerror=function(){sf.processing_status='Unreadable (read error)';SM.persist();app.render()};
      reader.readAsArrayBuffer(file);
    } else if(ext==='PDF'){
      sf.processing_status='Unreadable (PDF.js not loaded)';
      SM.persist();app.render();
    } else {
      sf.processing_status='Manual Review Required ('+ext+')';
      SM.persist();app.render();
    }
  },
  removeSubFile:function(sfId){
    SM.ccdm.entities.submission_files=SM.ccdm.entities.submission_files.filter(function(f){return f.submission_file_id!==sfId});
